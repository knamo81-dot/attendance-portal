  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f1f5f9;
      color: #0f172a;
    }
    .app {
      height: 100vh;
      padding: 10px;
      overflow: hidden;
    }
    .layout {
      width: 100%;
      height: calc(100vh - 20px);
      margin: 0;
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr);
      gap: 10px;
      align-items: stretch;
      overflow: hidden;
    }
    .sidenav {
      width: 48px;
      z-index: 20;
      background: #0f172a;
      color: #fff;
      border-radius: 16px;
      padding: 6px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: calc(100vh - 20px);
      height: calc(100vh - 20px);
      position: sticky;
      top: 10px;
      align-self: start;
      overflow: hidden;
    }
    .nav-btn {
      height: 36px;
      width: 36px;
      border-radius: 11px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: #fff;
      cursor: pointer;
      font-size: 10.5px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .nav-btn.home { background: rgba(255,255,255,0.18); margin-bottom: 12px; }
    .nav-btn.active {
      background: #ffffff;
      color: #0f172a;
      font-weight: 800;
      box-shadow: 0 4px 12px rgba(15,23,42,0.16);
    }

    .nav-btn.service-admin-btn {
      background: #ffffff;
      color: #0f172a;
      border: 1px solid rgba(255,255,255,0.28);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: -0.02em;
      box-shadow: 0 8px 22px rgba(15,23,42,0.22);
      margin-top: 2px;
    }
    .nav-btn.service-admin-btn:hover {
      transform: none;
      box-shadow: 0 6px 18px rgba(0,0,0,.18);
    }
        .nav-btn.nav-btn--soon {
      cursor: not-allowed;
      opacity: 0.38;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.65);
      font-size: 10px;
      line-height: 1.1;
      padding: 2px;
    }
    .nav-btn.nav-btn--soon.active {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.75);
      box-shadow: none;
    }
    .nav-group { display: flex; flex-direction: column; gap: 6px; }
    .portal-main {
      min-width: 0;
      height: calc(100vh - 20px);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
    }

    .portal-common-header {
      width: 100%;
      min-height: 92px;
      flex: 0 0 auto;
      position: relative;
      z-index: 30;
      border-radius: 20px;
      padding: 16px 22px;
      color: #fff;
      box-shadow: 0 6px 18px rgba(15,23,42,.11);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      background: linear-gradient(135deg, #c8102e 0%, #e11d2e 100%);
      transition: background .25s ease;
    }

    .portal-common-header .header-left {
      min-width: 0;
    }

    .portal-common-header .header-top {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,.76);
      margin-bottom: 4px;
      letter-spacing: .02em;
    }

    .portal-common-header .header-title {
      font-size: 26px;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -.04em;
      margin-bottom: 4px;
    }

    .portal-common-header .header-desc {
      font-size: 10px;
      line-height: 1.6;
      color: rgba(255,255,255,.88);
    }

    .portal-common-header .header-right {
      text-align: right;
      align-self: flex-end;
      padding-bottom: 2px;
      flex: 0 0 auto;
    }

    .portal-common-header .header-slogan {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,.9);
      line-height: 1.6;
      white-space: nowrap;
    }

    .portal-common-header .header-powered {
      margin-top: 4px;
      font-size: 10px;
      letter-spacing: .04em;
      color: rgba(255,255,255,.72);
      white-space: nowrap;
    }

    #portalFrame {
      width: 100%;
      height: 100%;
      min-height: 0;
      border: none;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 3px 12px rgba(15, 23, 42, 0.045);
      display: block;
      overflow: hidden;
    }


    body.auth-loading .layout {
      filter: blur(1px);
      pointer-events: none;
      user-select: none;
    }

    .auth-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(6px);
    }

    .auth-overlay[hidden] {
      display: none !important;
    }

    .auth-card {
      width: min(420px, 100%);
      background: #ffffff;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.35);
    }

    .auth-card[hidden] {
      display: none !important;
    }

    .auth-card h1 {
      margin: 0 0 8px;
      font-size: 26px;
      letter-spacing: -0.04em;
      color: #0f172a;
    }

    .auth-card p {
      margin: 0 0 22px;
      font-size: 10px;
      line-height: 1.6;
      color: #64748b;
    }

    .auth-field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 14px;
    }

    .auth-field label {
      font-size: 10.5px;
      font-weight: 800;
      color: #334155;
    }

    .auth-field input {
      width: 100%;
      height: 36px;
      border-radius: 11px;
      border: 1px solid #cbd5e1;
      padding: 0 14px;
      font-size: 12px;
      outline: none;
    }

    .auth-field input:focus {
      border-color: #c8102e;
      box-shadow: 0 0 0 3px rgba(200, 16, 46, 0.12);
    }

    .auth-button {
      width: 100%;
      height: 46px;
      border: none;
      border-radius: 15px;
      background: linear-gradient(135deg, #c8102e 0%, #e11d2e 100%);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 4px;
    }

    .auth-button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .auth-message {
      display: none;
      margin-top: 14px;
      padding: 11px 12px;
      border-radius: 12px;
      font-size: 10.5px;
      line-height: 1.5;
    }

    .auth-message.show {
      display: block;
    }

    .auth-message.error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .auth-message.success {
      background: #ecfdf5;
      color: #047857;
      border: 1px solid #a7f3d0;
    }

    .top-user-bar {
      position: fixed;
      top: 16px;
      right: 20px;

      align-items: center;
      gap: 6px;

      gap: 6px;

        width: 100%;
        text-align: left;
        align-self: flex-start;
      }

/* Portal compact baseline */
:root {
  --portal-app-padding: 10px;
  --portal-sidebar-width: 48px;
  --portal-gap: 10px;
  --portal-header-radius: 20px;
  --portal-frame-radius: 16px;
}

.app {
  padding: var(--portal-app-padding);
}

.layout {
  height: calc(100vh - (var(--portal-app-padding) * 2));
  grid-template-columns: var(--portal-sidebar-width) minmax(0, 1fr);
  gap: var(--portal-gap);
}

.sidenav {
  width: var(--portal-sidebar-width);
  min-height: calc(100vh - (var(--portal-app-padding) * 2));
  height: calc(100vh - (var(--portal-app-padding) * 2));
  top: var(--portal-app-padding);
}

.portal-main {
  height: calc(100vh - (var(--portal-app-padding) * 2));
  gap: var(--portal-gap);
}

.portal-common-header {
  min-height: 92px;
  border-radius: var(--portal-header-radius);
  padding: 16px 22px;
}

.portal-common-header .header-top {
  font-size: 11px;
  margin-bottom: 4px;
}

.portal-common-header .header-title {
  font-size: 26px;
  margin-bottom: 4px;
}

.portal-common-header .header-desc,
.portal-common-header .header-slogan {
  font-size: 11px;
}

.portal-common-header .header-powered {
  font-size: 10px;
}

.nav-btn {
  width: 36px;
  height: 36px;
  border-radius: 11px;
  font-size: 10.5px;
}

.nav-btn.home {
  margin-bottom: 12px;
}

.nav-group {
  gap: 6px;
}

.service-admin-btn {
  width: 34px;
  height: 34px;
  border-radius: 11px;
}

.service-admin-svg {
  width: 24px;
  height: 24px;
}

#portalFrame {
  border-radius: var(--portal-frame-radius);
}

.top-user-bar {
  top: 16px;
  right: 20px;
}

.user-chip {
  padding: 5px 8px;
  font-size: 10.5px;
}

.user-chip .role {
  font-size: 9.5px;
}

.auth-card {
  width: min(360px, 100%);
  border-radius: 16px;
  padding: 22px;
}

.auth-card h1 {
  font-size: 22px;
}

.auth-card p {
  font-size: 12px;
  margin-bottom: 16px;
}

.auth-field {
  gap: 5px;
  margin-bottom: 10px;
}

.auth-field label {
  font-size: 11px;
}

.auth-field input {
  height: 38px;
  border-radius: 11px;
  font-size: 12px;
  padding: 0 10px;
}

.auth-button {
  height: 38px;
  border-radius: 11px;
  font-size: 12px;
}

@media (max-width: 820px) {
  .portal-common-header {
    min-height: 112px;
  }
}

      title: '폐수/폐기물 운영일지',
      desc: '폐수/폐기물 배출시설 운영 기록과 수거 내역을 관리합니다.',
      gradient: 'linear-gradient(135deg, #047857 0%, #14b8a6 100%)'
    },
    'attendance.html': {
      top: 'Workforce Analytics',
      title: '근태 리스크 및 운영 분석',
      desc: '해당월 데이터를 기준으로 현재 상태를 설명하고, 관리자가 확인해야 할 핵심 리스크를 정리합니다.',
      gradient: 'linear-gradient(135deg, #16a34a 0%, #4ade80 100%)'
    },
    'research-staff/index.html': {
      top: 'Organization Management',
      title: '인력운영현황',
      desc: '조직과 인력 운영 현황을 확인합니다.',
      gradient: 'linear-gradient(135deg, #111827 0%, #1f2937 55%, #374151 100%)'
    },
    'reagent/index.html': {
      top: 'Resource Management',
      title: '시약·초자 주문 시스템',
      desc: '제품 신청, 취합, 정리 업무를 관리합니다.',
      gradient: 'linear-gradient(135deg, #173a7a 0%, #2251a3 100%)'
    },
    'settings.html': {
      top: 'Portal Settings',
      title: '설정',
      desc: '사용자, 권한, 포탈 설정을 관리합니다.',
      gradient: 'linear-gradient(135deg, #475569 0%, #0f172a 100%)'
    },
    'service-admin/service-admin.html': {
      top: 'ExeloLab Service Admin',
      title: '서비스 관리자',
      desc: '회사 등록과 서비스 운영 설정을 관리합니다.',
      gradient: 'linear-gradient(135deg, #061f44 0%, #0f172a 55%, #158154 100%)'
    },
  };

  function normalizePortalSrc(src) {
    return String(src || '').split('?')[0];
  }

  function updatePortalHeader(src) {
    const key = normalizePortalSrc(src);
    const meta = portalHeaderMeta[key] || portalHeaderMeta[HOME_SRC];
    const header = document.getElementById('portalCommonHeader');
    const top = document.getElementById('portalHeaderTop');
    const title = document.getElementById('portalHeaderTitle');
    const desc = document.getElementById('portalHeaderDesc');

    if (header && meta.gradient) header.style.background = meta.gradient;
    if (top) top.textContent = meta.top || '';
    if (title) title.textContent = meta.title || '';
    if (desc) desc.textContent = meta.desc || '';
  }

  function setActiveNav(activeBtn) {
    navButtons.forEach((btn) => btn.classList.toggle('active', btn === activeBtn));
  }

  function findNavBySrc(src) {
    return navButtons.find((btn) => btn.getAttribute('data-portal-src') === src);
  }

  function setBoxMessage(target, message) {
    if (!target) return;
    target.textContent = message || '';
    target.classList.toggle('show', !!message);
  }


  function isServiceAdminRole() {
    const role = String(currentProfile?.role || window.portalSession?.role || '').trim();
    return role === 'service_admin';
  }

  function updateServiceAdminButtonVisibility() {
    if (!els.serviceAdminBtn) return;

    if (isServiceAdminRole()) {
      document.body.classList.add('service-admin-enabled');
    } else {
      document.body.classList.remove('service-admin-enabled');
    }

    // EL 심볼은 모든 사용자에게 브랜드 심볼처럼 항상 표시합니다.
    els.serviceAdminBtn.hidden = false;
    els.serviceAdminBtn.classList.remove('disabled');
    els.serviceAdminBtn.setAttribute('title', 'ExeloLab');
    els.serviceAdminBtn.setAttribute('aria-label', 'ExeloLab');
  }

  function isServiceAdminSrc(src) {
    return normalizePortalSrc(src) === 'service-admin/service-admin.html';
  }


  function clearLoginInputs(options = {}) {
    const keepEmail = options.keepEmail === true;

    if (!keepEmail && els.loginEmail) {
      els.loginEmail.value = '';
      els.loginEmail.defaultValue = '';
      els.loginEmail.setAttribute('autocomplete', 'off');
    }

    [els.loginPassword, els.newPassword, els.confirmPassword].forEach(function (field) {
      if (!field) return;
      field.value = '';
      field.defaultValue = '';
      field.setAttribute('autocomplete', 'new-password');
    });
  }

  function roleLabel(role) {
    if (role === 'admin') return '관리자';
    if (role === 'operator') return '운영자';
    if (role === 'supervisor') return '책임자';
    if (role === 'service_admin') return '서비스관리자';
    return '일반사용자';
  }

  function buildPortalSession() {
    const companyId = currentProfile?.company_id || currentCompany?.id || '';
    const companyCode = currentCompany?.company_code || '';
    const companyName = currentCompany?.company_name || '';
    const role = currentProfile?.role || 'viewer';

    return {
      user: currentUser,
      profile: currentProfile,
      company: currentCompany,
      email: currentUser?.email || '',
      companyId,
      company_id: companyId,
      companyCode,
      company_code: companyCode,
      companyName,
      company_name: companyName,
      role,
      supabase: supabaseClient,
      buildCompanyScopedPayload,
      buildCompanyScopedRows,
      scopeCompanyQuery
    };
  }

  function buildCompanyScopedPayload(payload = {}) {
    const session = buildPortalSession();
    return {
      ...payload,
      company_id: payload.company_id || payload.companyId || session.companyId || currentProfile?.company_id || currentCompany?.id || null
    };
  }

  function buildCompanyScopedRows(rows = []) {
    return (Array.isArray(rows) ? rows : []).map((row) => buildCompanyScopedPayload(row));
  }

  function scopeCompanyQuery(query) {
    const session = buildPortalSession();
    const companyId = session.companyId || currentProfile?.company_id || currentCompany?.id || '';
    return companyId ? query.eq('company_id', companyId) : query;
  }

  window.buildCompanyScopedPayload = buildCompanyScopedPayload;
  window.buildCompanyScopedRows = buildCompanyScopedRows;
  window.scopeCompanyQuery = scopeCompanyQuery;


  function publishPortalSession() {
    const session = buildPortalSession();
    window.portalSession = session;
    window.currentPortalSession = session;
    window.currentCompanyId = session.companyId;
    window.currentCompanyCode = session.companyCode;
    window.currentCompanyName = session.companyName;
    window.currentUserRole = session.role;
    window.dispatchEvent(new CustomEvent('portal-session-ready', { detail: session }));
    return session;
  }

  function clearPortalSession() {
    currentUser = null;
    currentProfile = null;
    currentCompany = null;
    window.portalSession = null;
    window.currentPortalSession = null;
    window.currentCompanyId = null;
    window.currentCompanyCode = null;
    window.currentCompanyName = null;
    window.currentUserRole = null;
    updateServiceAdminButtonVisibility();
  }

  window.getPortalSession = function () {
    return buildPortalSession();
  };

  window.getPortalAuthContext = function () {
    return buildPortalSession();
  };

  window.getCompanyAppUrl = function (appUrl) {
    const session = buildPortalSession();
    if (!appUrl || !session.companyId) return appUrl;
    return appUrl + (String(appUrl).includes('?') ? '&' : '?') + 'company_id=' + encodeURIComponent(session.companyId);
  };

  function showLogin(message = '') {
    document.body.classList.add('auth-loading');
    clearLoginInputs();
    setTimeout(() => clearLoginInputs(), 80);
    setTimeout(() => clearLoginInputs(), 350);
    setTimeout(() => clearLoginInputs(), 800);
    if (els.overlay) els.overlay.hidden = false;
    if (els.loginCard) els.loginCard.hidden = false;
    if (els.passwordCard) els.passwordCard.hidden = true;
    if (els.topUserBar) els.topUserBar.hidden = true;
    setBoxMessage(els.loginError, message);
    setBoxMessage(els.passwordError, '');
    setBoxMessage(els.passwordSuccess, '');
  }

  function showPasswordChange(message = '') {
    document.body.classList.add('auth-loading');
    if (els.overlay) els.overlay.hidden = false;
    if (els.loginCard) els.loginCard.hidden = true;
    if (els.passwordCard) els.passwordCard.hidden = false;
    setBoxMessage(els.passwordError, message);
    setBoxMessage(els.passwordSuccess, '');
  }

  function showPortal() {
    document.body.classList.remove('auth-loading');
    if (els.overlay) els.overlay.hidden = true;
    if (els.loginCard) els.loginCard.hidden = true;
    if (els.passwordCard) els.passwordCard.hidden = true;
    if (els.topUserBar) els.topUserBar.hidden = false;
  }

  function applyRoleUI() {
    if (!els.userChip) return;
    const session = buildPortalSession();
    const name = currentProfile?.name || currentUser?.email || '사용자';
    const company = session.companyName ? `<span class="role">${session.companyName}</span>` : '';
    els.userChip.innerHTML = `<span>${name}</span>${company}<span class="role">${roleLabel(session.role)}</span>`;
    updateServiceAdminButtonVisibility();
  }

  async function fetchProfile(email) {
    const { data, error } = await supabaseClient
      .from('users')
      .select('email,name,role,is_active,must_change_password,company_id')
      .eq('email', email)
      .maybeSingle();
    if (error) throw error;
    return data;
  }

  async function fetchCompany(companyId) {
    if (!companyId) return null;
    const { data, error } = await supabaseClient
      .from('companies')
      .select('id,company_name,company_code,is_active')
      .eq('id', companyId)
      .maybeSingle();
    if (error) throw error;
    return data;
  }

  async function loadUserContext(user) {
    if (!user?.email) return false;

    const profile = await fetchProfile(user.email);
    if (!profile) {
      await supabaseClient.auth.signOut();
      clearPortalSession();
      showLogin('users 테이블에 등록되지 않은 이메일입니다. 관리자에게 계정 등록을 요청해 주세요.');
      return false;
    }

    if (profile.is_active === false) {
      await supabaseClient.auth.signOut();
      clearPortalSession();
      showLogin('비활성화된 계정입니다. 관리자에게 문의해 주세요.');
      return false;
    }

    if (!profile.company_id) {
      await supabaseClient.auth.signOut();
      clearPortalSession();
      showLogin('회사 정보가 연결되지 않은 계정입니다. users.company_id를 확인해 주세요.');
      return false;
    }

    const company = await fetchCompany(profile.company_id);
    if (!company) {
      await supabaseClient.auth.signOut();
      clearPortalSession();
      showLogin('회사 정보를 찾지 못했습니다. companies 테이블과 users.company_id 연결을 확인해 주세요.');
      return false;
    }

    if (company.is_active === false) {
      await supabaseClient.auth.signOut();
      clearPortalSession();
      showLogin('비활성화된 회사입니다. 관리자에게 문의해 주세요.');
      return false;
    }

    currentUser = user;
    currentProfile = profile;
    currentCompany = company;
    publishPortalSession();
    applyRoleUI();
    return true;
  }

  function isReagentSrc(src) {
    return String(src || '').includes('reagent/index.html');
  }

  function saveReagentUserHint() {
    const session = buildPortalSession();
    if (!session.email) return;
    try {
      localStorage.setItem('reagent_current_user', JSON.stringify({
        email: session.email,
        company_id: session.companyId || '',
        company_code: session.companyCode || '',
        company_name: session.companyName || '',
        user_role: session.role || '',
        role: session.role || '',
        is_global_admin: session.role === 'admin',
        is_reagent_operator: false,
        reagent_role: ''
      }));
    } catch (_) {}
  }

  function buildSrcWithSession(src) {
    if (!src) return src;
    const session = buildPortalSession();
    const params = [];

    if (session.email) params.push('email=' + encodeURIComponent(session.email));
    if (session.companyId) params.push('company_id=' + encodeURIComponent(session.companyId));
    if (session.companyCode) params.push('company_code=' + encodeURIComponent(session.companyCode));
    if (session.companyName) params.push('company_name=' + encodeURIComponent(session.companyName));

    if (src === HOME_SRC) {
      params.push('portal_auth=1');
      params.push('embed=1');
    }

    if (isReagentSrc(src)) {
      params.push('portal_auth=1');
      params.push('v=' + Date.now());
    }

    if (!params.length) return src;
    return src + (src.includes('?') ? '&' : '?') + params.join('&');
  }

  function postAuthToFrame() {
    if (!frame || !frame.contentWindow || !currentUser) return;
    const session = buildPortalSession();

    frame.contentWindow.postMessage({
      type: 'portal-auth',
      user: {
        email: session.email,
        company_id: session.companyId,
        companyId: session.companyId,
        company_code: session.companyCode,
        companyCode: session.companyCode,
        company_name: session.companyName,
        companyName: session.companyName,
        role: session.role
      },
      company: {
        id: session.companyId,
        company_id: session.companyId,
        code: session.companyCode,
        company_code: session.companyCode,
        name: session.companyName,
        company_name: session.companyName
      }
    }, '*');
  }

  function replacePortalFrame(src) {
    if (!frame || !src) return;
    updatePortalHeader(src);
    frame.onload = postAuthToFrame;
    frame.src = src;
  }

  async function navigateBySrc(src, btn, options = {}) {
    if (!src) return;

    const isHome = src === HOME_SRC;
    if (!currentUser && !isHome) {
      showLogin('로그인 후 이용할 수 있습니다.');
      return;
    }

    if (isServiceAdminSrc(src) && !isServiceAdminRole()) {
      return;
    }

    if (isReagentSrc(src)) saveReagentUserHint();

    if (isHome) {
      localStorage.removeItem(LAST_PAGE_KEY);
    } else if (!options.skipSave) {
      localStorage.setItem(LAST_PAGE_KEY, src);
    }

    replacePortalFrame(buildSrcWithSession(src));
    if (btn) setActiveNav(btn);
  }

  async function navigate(btn, options) {
    if (!btn) return;
    await navigateBySrc(btn.getAttribute('data-portal-src'), btn, options);
  }

  async function restoreLastPage() {
    const savedSrc = localStorage.getItem(LAST_PAGE_KEY);
    if (!currentUser || !savedSrc || savedSrc === HOME_SRC) {
      await navigateBySrc(HOME_SRC, homeBtn, { skipSave: true });
      return;
    }

    const targetBtn = findNavBySrc(savedSrc);
    if (!targetBtn) {
      localStorage.removeItem(LAST_PAGE_KEY);
      await navigateBySrc(HOME_SRC, homeBtn, { skipSave: true });
      return;
    }

    await navigate(targetBtn, { skipSave: true });
  }

  async function login() {
    if (authBusy) return;
    const email = (els.loginEmail?.value || '').trim();
    const password = els.loginPassword?.value || '';

    if (!email || !password) {
      setBoxMessage(els.loginError, '이메일과 비밀번호를 입력해 주세요.');
      return;
    }

    authBusy = true;
    if (els.loginButton) els.loginButton.disabled = true;
    setBoxMessage(els.loginError, '');

    try {
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) throw error;

      const ok = await loadUserContext(data?.user || null);
      if (!ok) return;
      clearLoginInputs();

      if (currentProfile?.must_change_password) {
        showPasswordChange('');
        return;
      }

      showPortal();
      await restoreLastPage();
    } catch (error) {
      console.error('login error:', error);
      let msg = error?.message || '로그인에 실패했습니다.';
      if (msg === 'Invalid login credentials') {
        msg = '로그인 정보가 맞지 않습니다. 이메일과 비밀번호를 다시 확인해 주세요.';
      }
      setBoxMessage(els.loginError, msg);
    } finally {
      authBusy = false;
      if (els.loginButton) els.loginButton.disabled = false;
    }
  }

  async function changePassword() {
    const newPassword = els.newPassword?.value || '';
    const confirmPassword = els.confirmPassword?.value || '';

    if (newPassword.length < 6) {
      setBoxMessage(els.passwordError, '비밀번호는 6자 이상으로 입력해 주세요.');
      return;
    }
    if (newPassword !== confirmPassword) {
      setBoxMessage(els.passwordError, '새 비밀번호와 확인 값이 서로 다릅니다.');
      return;
    }

    if (els.changePasswordButton) els.changePasswordButton.disabled = true;
    setBoxMessage(els.passwordError, '');
    setBoxMessage(els.passwordSuccess, '');

    try {
      const { error: pwError } = await supabaseClient.auth.updateUser({ password: newPassword });
      if (pwError) throw pwError;

      if (currentUser?.email) {
        const { error: profileError } = await supabaseClient
          .from('users')
          .update({ must_change_password: false })
          .eq('email', currentUser.email);
        if (profileError) throw profileError;
      }

      currentProfile = { ...(currentProfile || {}), must_change_password: false };
      publishPortalSession();
      setBoxMessage(els.passwordSuccess, '비밀번호가 변경되었습니다. 포털로 이동합니다.');
      setTimeout(async () => {
        showPortal();
        await restoreLastPage();
      }, 650);
    } catch (error) {
      console.error('changePassword error:', error);
      setBoxMessage(els.passwordError, error?.message || '비밀번호 변경 중 오류가 발생했습니다.');
    } finally {
      if (els.changePasswordButton) els.changePasswordButton.disabled = false;
    }
  }

  async function logout() {
    try {
      await supabaseClient.auth.signOut();
    } catch (error) {
      console.warn('signOut warning:', error);
    }
    localStorage.removeItem(LAST_PAGE_KEY);
    try { localStorage.removeItem('reagent_current_user'); } catch (_) {}
    clearPortalSession();
    clearLoginInputs();
    replacePortalFrame(HOME_SRC);
    if (homeBtn) setActiveNav(homeBtn);
    showLogin('로그아웃되었습니다.');
    setTimeout(() => clearLoginInputs(), 80);
    setTimeout(() => clearLoginInputs(), 350);
    setTimeout(() => clearLoginInputs(), 800);
  }


  function installUserAppRolesCompanyGuard() {
    if (supabaseClient.__companyGuardInstalled) return;
    const originalFrom = supabaseClient.from.bind(supabaseClient);

    supabaseClient.from = function guardedFrom(tableName) {
      const query = originalFrom(tableName);

      if (String(tableName) !== 'user_app_roles') return query;

      const originalInsert = query.insert?.bind(query);
      const originalUpsert = query.upsert?.bind(query);

      if (originalInsert) {
        query.insert = function guardedInsert(values, options) {
          const nextValues = Array.isArray(values)
            ? buildCompanyScopedRows(values)
            : buildCompanyScopedPayload(values);
          return originalInsert(nextValues, options);
        };
      }

      if (originalUpsert) {
        query.upsert = function guardedUpsert(values, options) {
          const nextValues = Array.isArray(values)
            ? buildCompanyScopedRows(values)
            : buildCompanyScopedPayload(values);
          return originalUpsert(nextValues, options);
        };
      }

      return query;
    };

    supabaseClient.__companyGuardInstalled = true;
  }


  function bindEvents() {
    navButtons.forEach(function (btn) {
      btn.addEventListener('click', function (event) {
        event.preventDefault();
        navigate(btn).catch(function (error) {
          console.error('portal navigation failed:', error);
          alert('화면 이동 중 오류가 발생했습니다. 콘솔 오류를 확인해 주세요.');
        });
      });
    });

    logoutBtn?.addEventListener('click', function (event) {
      event.preventDefault();
      logout();
    });

    els.loginButton?.addEventListener('click', login);
    els.loginEmail?.addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
    els.loginPassword?.addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
    els.changePasswordButton?.addEventListener('click', changePassword);
    els.confirmPassword?.addEventListener('keydown', (e) => { if (e.key === 'Enter') changePassword(); });
  }

  async function boot() {
    installUserAppRolesCompanyGuard();
    bindEvents();
    updatePortalHeader(HOME_SRC);

    const { data } = await supabaseClient.auth.getSession();
    const sessionUser = data?.session?.user || null;

    if (!sessionUser) {
      clearPortalSession();
      replacePortalFrame(HOME_SRC);
      if (homeBtn) setActiveNav(homeBtn);
      showLogin('');
      return;
    }

    try {
      const ok = await loadUserContext(sessionUser);
      if (!ok) return;

      if (currentProfile?.must_change_password) {
        showPasswordChange('');
        return;
      }

      showPortal();
      const navEntry = performance.getEntriesByType('navigation')[0];
      const navType = navEntry && navEntry.type ? navEntry.type : '';

      if (navType === 'reload') {
        await restoreLastPage();
      } else {
        await navigateBySrc(HOME_SRC, homeBtn, { skipSave: true });
      }
    } catch (error) {
      console.error('boot failed:', error);
      await supabaseClient.auth.signOut();
      clearPortalSession();
      showLogin('사용자 권한 정보를 확인하지 못했습니다. users와 companies 정보를 확인해 주세요.');
    }
  }

  window.portalLogout = logout;
  window.portalNavigate = navigateBySrc;
  window.portalDebug = function () {
    return {
      frameSrc: document.getElementById('portalFrame')?.src || '',
      navButtonCount: navButtons.length,
      portalSession: window.portalSession || null,
      lastPage: localStorage.getItem(LAST_PAGE_KEY)
    };
  };

  boot();
})();
</script>
