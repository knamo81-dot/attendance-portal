<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab Operations Portal (shell)</title>
  
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f1f5f9;
      color: #0f172a;
    }
    .app {
      min-height: 100vh;
      padding: 16px;
    }
    .layout {
      width: 100%;
      margin: 0;
      min-height: calc(100vh - 32px);
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }
    .sidenav {
      width: 72px;
      z-index: 20;
      background: #0f172a;
      color: #fff;
      border-radius: 24px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: calc(100vh - 32px);
      height: calc(100vh - 32px);
      position: sticky;
      top: 16px;
      align-self: start;
      overflow: hidden;
    }
    .nav-btn {
      height: 44px;
      width: 44px;
      border-radius: 14px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: #fff;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .nav-btn.home { background: rgba(255,255,255,0.18); margin-bottom: 18px; }
    .nav-btn.active {
      background: #ffffff;
      color: #0f172a;
      font-weight: 800;
      box-shadow: 0 6px 18px rgba(15,23,42,0.18);
    }
    .nav-btn.nav-btn--soon {
      cursor: not-allowed;
      opacity: 0.38;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.65);
      font-size: 10px;
      line-height: 1.1;
      padding: 2px;
    }
    .nav-btn.nav-btn--soon.active {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.75);
      box-shadow: none;
    }
    .nav-group { display: flex; flex-direction: column; gap: 8px; }
    .portal-main {
      min-width: 0;
      height: auto;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 16px;
    }

    .portal-common-header {
      width: 100%;
      min-height: 112px;
      border-radius: 26px;
      padding: 22px 30px;
      color: #fff;
      box-shadow: 0 10px 28px rgba(15,23,42,.14);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      background: linear-gradient(135deg, #c8102e 0%, #e11d2e 100%);
      transition: background .25s ease;
    }

    .portal-common-header .header-left {
      min-width: 0;
    }

    .portal-common-header .header-top {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,.76);
      margin-bottom: 6px;
      letter-spacing: .02em;
    }

    .portal-common-header .header-title {
      font-size: 32px;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -.04em;
      margin-bottom: 6px;
    }

    .portal-common-header .header-desc {
      font-size: 13px;
      line-height: 1.6;
      color: rgba(255,255,255,.88);
    }

    .portal-common-header .header-right {
      text-align: right;
      align-self: flex-end;
      padding-bottom: 2px;
      flex: 0 0 auto;
    }

    .portal-common-header .header-slogan {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,.9);
      line-height: 1.6;
      white-space: nowrap;
    }

    .portal-common-header .header-powered {
      margin-top: 4px;
      font-size: 11px;
      letter-spacing: .04em;
      color: rgba(255,255,255,.72);
      white-space: nowrap;
    }

    #portalFrame {
      width: 100%;
      min-height: calc(100vh - 160px);
      height: auto;
      border: none;
      border-radius: 22px;
      background: #fff;
      box-shadow: 0 4px 18px rgba(15, 23, 42, 0.06);
      display: block;
    }

    @media (max-width: 820px) {
      .portal-common-header {
        flex-direction: column;
        justify-content: flex-start;
        min-height: 132px;
      }

      .portal-common-header .header-right {
        width: 100%;
        text-align: left;
        align-self: flex-start;
      }
    }
  </style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="app">
    <div class="layout">
      <div class="sidenav">
        <div>
          <button type="button" id="homeNavBtn" class="nav-btn home active" data-portal-src="portal-main/portal-main.html" title="홈">홈</button>
          <div class="nav-group">
            <button type="button" id="workspaceNavBtn" class="nav-btn" data-portal-src="portal-home/portal-home.html" title="업무">업무</button>
            <button type="button" id="wastewaterNavBtn" class="nav-btn" data-portal-src="wastewater/index.html" title="폐수">폐수</button>
            <button type="button" id="attendanceNavBtn" class="nav-btn" data-portal-src="attendance.html" title="근태">근태</button>
            <button type="button" id="researchStaffNavBtn" class="nav-btn" data-portal-src="research-staff/index.html" title="인력운영현황">인력</button>
            <button type="button" id="suppliesNavBtn" class="nav-btn" data-portal-src="reagent/index.html" title="시약">시약</button>
            <button type="button" id="mealNavBtn" class="nav-btn nav-btn--soon" disabled title="준비 중">준비중</button>
            <button type="button" id="docsNavBtn" class="nav-btn nav-btn--soon" disabled title="준비 중">준비중</button>
          </div>
        </div>
        <div class="nav-group">
          <button type="button" id="settingsNavBtn" class="nav-btn" data-portal-src="settings.html" title="설정">설정</button>
          <button type="button" id="logoutNavBtn" class="nav-btn" title="로그아웃 안내">종료</button>
        </div>
      </div>
      <div class="portal-main">
        <div id="portalCommonHeader" class="portal-common-header">
          <div class="header-left">
            <div id="portalHeaderTop" class="header-top">Integrated Operations Platform</div>
            <div id="portalHeaderTitle" class="header-title">통합 운영 플랫폼</div>
            <div id="portalHeaderDesc" class="header-desc">운영 시스템과 업무 환경을 하나의 포탈에서 통합 관리합니다.</div>
          </div>
          <div class="header-right">
            <div class="header-slogan">Work smarter. Think deeper.</div>
            <div class="header-powered">powered by ExeloLab</div>
          </div>
        </div>
        <iframe id="portalFrame" title="포털 본문" src="portal-main/portal-main.html"></iframe>
      </div>
    </div>
  </div>
<script>
(function () {
  const SUPABASE_URL = 'https://mbqpsovlwvedwrtbbauj.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1icXBzb3Zsd3ZlZHdydGJiYXVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTI2NTksImV4cCI6MjA5MTM4ODY1OX0.B3VWnRUn-A9hABLrx5ysFDQeAJvP_rTktzGiuz5LeTY';

  const HOME_SRC = 'portal-main/portal-main.html';
  const LAST_PAGE_KEY = 'portalLastPage';

  let frame = document.getElementById('portalFrame');
  const navButtons = Array.prototype.slice.call(document.querySelectorAll('.nav-btn[data-portal-src]'));
  const logoutBtn = document.getElementById('logoutNavBtn');
  const homeBtn = document.getElementById('homeNavBtn');

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const portalHeaderMeta = {
    'portal-main/portal-main.html': {
      top: 'Integrated Operations Platform',
      title: '통합 운영 플랫폼',
      desc: '운영 시스템과 업무 환경을 하나의 포탈에서 통합 관리합니다.',
      gradient: 'linear-gradient(135deg, #c8102e 0%, #e11d2e 100%)'
    },
    'portal-home/portal-home.html': {
      top: 'Integrated Operations Platform',
      title: '워크스페이스',
      desc: '메모와 일정·예약을 통합 관리합니다.',
      gradient: 'linear-gradient(135deg, #0284c7 0%, #38bdf8 100%)'
    },
    'wastewater/index.html': {
      top: 'Operations Management',
      title: '폐수 운영일지',
      desc: '폐수 배출시설 운영 기록과 수거 내역을 관리합니다.',
      gradient: 'linear-gradient(135deg, #047857 0%, #14b8a6 100%)'
    },
    'attendance.html': {
      top: 'Workforce Analytics',
      title: '근태관리',
      desc: '출퇴근, 연장근무, 누락 데이터를 분석합니다.',
      gradient: 'linear-gradient(135deg, #22c55e 0%, #16a34a 100%)'
    },
    'research-staff/index.html': {
      top: 'Organization Management',
      title: '인력운영현황',
      desc: '조직과 인력 운영 현황을 확인합니다.',
      gradient: 'linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%)'
    },
    'reagent/index.html': {
      top: 'Resource Management',
      title: '시약·초자',
      desc: '제품 신청, 취합, 정리 업무를 관리합니다.',
      gradient: 'linear-gradient(135deg, #173a7a 0%, #2251a3 100%)'
    },
    'settings.html': {
      top: 'Portal Settings',
      title: '설정',
      desc: '사용자, 권한, 포탈 설정을 관리합니다.',
      gradient: 'linear-gradient(135deg, #475569 0%, #0f172a 100%)'
    }
  };

  function normalizePortalSrc(src) {
    return String(src || '').split('?')[0];
  }

  function updatePortalHeader(src) {
    const key = normalizePortalSrc(src);
    const meta = portalHeaderMeta[key] || portalHeaderMeta[HOME_SRC];
    const header = document.getElementById('portalCommonHeader');
    const top = document.getElementById('portalHeaderTop');
    const title = document.getElementById('portalHeaderTitle');
    const desc = document.getElementById('portalHeaderDesc');

    if (header && meta.gradient) header.style.background = meta.gradient;
    if (top) top.textContent = meta.top || '';
    if (title) title.textContent = meta.title || '';
    if (desc) desc.textContent = meta.desc || '';
  }

  function setActiveNav(activeBtn) {
    navButtons.forEach(function (b) {
      b.classList.toggle('active', b === activeBtn);
    });
  }

  function findNavBySrc(src) {
    return navButtons.find(function (btn) {
      return btn.getAttribute('data-portal-src') === src;
    });
  }

  function postAuthToFrame(user) {
    if (!frame || !frame.contentWindow || !user) return;

    frame.contentWindow.postMessage(
      {
        type: 'portal-auth',
        user: {
          email: user.email
        }
      },
      '*'
    );
  }

  function replacePortalFrame(src, user) {
    const main = document.querySelector('.portal-main');
    if (!main || !src) return;

    updatePortalHeader(src);

    if (frame) {
      try {
        frame.onload = null;
        frame.src = 'about:blank';
      } catch (_) {}
      frame.remove();
    }

    const nextFrame = document.createElement('iframe');
    nextFrame.id = 'portalFrame';
    nextFrame.title = '포털 본문';
    nextFrame.setAttribute('loading', 'eager');
    nextFrame.setAttribute('referrerpolicy', 'no-referrer-when-downgrade');

    nextFrame.onload = function () {
      if (user) postAuthToFrame(user);
    };

    main.appendChild(nextFrame);
    frame = nextFrame;
    nextFrame.src = src;
  }

  async function getCurrentUser() {
    const { data } = await supabaseClient.auth.getUser();
    return data?.user || null;
  }

  async function ensureAuthenticated() {
    const { data } = await supabaseClient.auth.getSession();

    if (!data.session) {
      localStorage.removeItem(LAST_PAGE_KEY);

      replacePortalFrame(HOME_SRC, null);
      if (homeBtn) {
        setActiveNav(homeBtn);
      }
      return false;
    }

    return true;
  }


  function isReagentSrc(src) {
    return String(src || '').includes('reagent/index.html');
  }

  function saveReagentUserHint(user) {
    if (!user) return;

    // 시약초자 권한은 포탈 settings(user_app_roles)를 앱 내부에서 직접 조회합니다.
    // 포탈은 폐수 앱처럼 로그인 사용자 식별 정보만 전달합니다.
    try {
      localStorage.setItem('reagent_current_user', JSON.stringify({
        email: user.email || '',
        user_role: '',
        role: '',
        is_global_admin: false,
        is_reagent_operator: false,
        reagent_role: ''
      }));
    } catch (_) {}
  }


  function buildSrcWithUser(src, user) {
    if (!src || !user) return src;

    const params = [];
    const email = user.email || '';

    if (email) params.push('email=' + encodeURIComponent(email));

    if (src === HOME_SRC) {
      params.push('portal_auth=1');
      params.push('embed=1');
    }

    if (isReagentSrc(src)) {
      params.push('portal_auth=1');
      params.push('v=' + Date.now());
    }

    if (!params.length) return src;

    const separator = src.includes('?') ? '&' : '?';
    return src + separator + params.join('&');
  }

  async function navigate(btn, options) {
    options = options || {};

    var src = btn.getAttribute('data-portal-src');
    if (!src || !frame) return;

    // 홈은 로그인 전에도 열 수 있게 두되, 로그인 세션이 있으면 다른 앱처럼 email을 URL로 전달합니다.
    if (src === HOME_SRC) {
      const user = await getCurrentUser();
      const finalHomeSrc = user ? buildSrcWithUser(HOME_SRC, user) : HOME_SRC;
      replacePortalFrame(finalHomeSrc, user);
      localStorage.removeItem(LAST_PAGE_KEY);
      setActiveNav(btn);
      return;
    }

    const ok = await ensureAuthenticated();
    if (!ok) return;

    const user = await getCurrentUser();

    if (isReagentSrc(src)) {
      saveReagentUserHint(user);
    }

    // 사용자가 선택한 앱만 마지막 페이지로 저장합니다.
    if (!options.skipSave) {
      localStorage.setItem(LAST_PAGE_KEY, src);
    }

    const finalSrc = buildSrcWithUser(src, user);
    replacePortalFrame(finalSrc, user);
    setActiveNav(btn);
  }

  async function restoreLastPage() {
    if (!frame) return;

    const { data } = await supabaseClient.auth.getSession();
    const hasSession = !!data.session;
    const savedSrc = localStorage.getItem(LAST_PAGE_KEY);

    if (!hasSession) {
      localStorage.removeItem(LAST_PAGE_KEY);
      replacePortalFrame(HOME_SRC, null);
      if (homeBtn) setActiveNav(homeBtn);
      return;
    }

    if (!savedSrc || savedSrc === HOME_SRC) {
      replacePortalFrame(HOME_SRC, null);
      if (homeBtn) setActiveNav(homeBtn);
      return;
    }

    const targetBtn = findNavBySrc(savedSrc);
    if (!targetBtn) {
      localStorage.removeItem(LAST_PAGE_KEY);
      replacePortalFrame(HOME_SRC, null);
      if (homeBtn) setActiveNav(homeBtn);
      return;
    }

    const user = await getCurrentUser();

    if (isReagentSrc(savedSrc)) {
      saveReagentUserHint(user);
    }

    const finalSrc = buildSrcWithUser(savedSrc, user);
    replacePortalFrame(finalSrc, user);
    setActiveNav(targetBtn);
  }

  navButtons.forEach(function (btn) {
    btn.addEventListener('click', async function () {
      await navigate(btn);
    });
  });

  logoutBtn.addEventListener('click', async function () {
    try {
      await supabaseClient.auth.signOut();
      localStorage.removeItem(LAST_PAGE_KEY);

      replacePortalFrame(HOME_SRC, null);

      if (homeBtn) {
        setActiveNav(homeBtn);
      }

      window.location.reload();

    } catch (e) {
      console.error('logout failed:', e);
      alert('로그아웃 중 오류가 발생했습니다.');
    }
  });

  // 새 접속은 항상 홈에서 시작하고, 브라우저 새로고침일 때만 마지막 프로그램을 복원합니다.
  // - 일반 접속/새 탭/주소 직접 입력: portal-main/portal-main.html
  // - F5 또는 브라우저 새로고침: localStorage의 마지막 프로그램 유지
  const navEntry = performance.getEntriesByType('navigation')[0];
  const navType = navEntry && navEntry.type ? navEntry.type : '';

  updatePortalHeader(HOME_SRC);

  if (navType === 'reload') {
    restoreLastPage();
  } else {
    (async function openHomeOnFirstVisit() {
      const user = await getCurrentUser();

      replacePortalFrame(user ? buildSrcWithUser(HOME_SRC, user) : HOME_SRC, user);

      if (homeBtn) {
        setActiveNav(homeBtn);
      }
    })();
  }
})();
</script>
</body>
</html>
