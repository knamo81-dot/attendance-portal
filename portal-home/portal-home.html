<head>

  <title>Lab Portal Work</title>

 <link rel="icon" href="/favicon.ico">
 <link rel="apple-touch-icon" href="/icon-192.png">
 <link rel="manifest" href="/manifest.json"> 

  <link rel="stylesheet" href="./portal-home.css" />

  <script src="./js/portal-home-embed.js"></script>

<script src="./js/portal-home-url-email-helper.js"></script>


<style id="portal-home-embedded-tab-hide">
/* 포탈 공통 버튼 사용 시 내부 업무 탭은 숨기고 공간도 제거 */
.workspace-tabs{
  display:none !important;
  height:0 !important;
  min-height:0 !important;
  margin:0 !important;
  padding:0 !important;
  border:0 !important;
  overflow:hidden !important;
}

/* 내부 탭이 사라진 만큼 본문을 위로 붙임 */
#home-page.home-root{
  padding-top:0 !important;
}

#tab-content.content{
  margin-top:0 !important;
}
</style>

<body class="auth-loading">

 <div id="authOverlay" class="auth-overlay" hidden>
    <div id="loginCard" class="auth-card">
      <h1 class="auth-title">연구소 포털 로그인</h1>
      <p class="auth-subtitle">사내에서 등록된 이메일과 비밀번호로 로그인하세요. 초기 비밀번호는 관리자 지정값(예: 사번 또는 임시 비밀번호)이며, 최초 로그인 사용자는 비밀번호를 바로 변경하게 됩니다.</p>
      <div class="auth-field">
        <label class="auth-label" for="loginEmail">이메일</label>
        <input id="loginEmail" class="auth-input" type="email" autocomplete="username" placeholder="example@scd.co.kr" />
      </div>
      <div class="auth-field">
        <label class="auth-label" for="loginPassword">비밀번호</label>
        <input id="loginPassword" class="auth-input" type="password" autocomplete="current-password" placeholder="비밀번호 입력" />
      </div>
      <div class="auth-actions">
        <button id="loginButton" class="auth-btn primary" type="button">로그인</button>
      </div>
      <div id="loginError" class="auth-error"></div>
      <div class="auth-helper">회원가입 버튼은 제공하지 않습니다. 등록된 계정만 로그인할 수 있습니다.</div>
    </div>

    <div id="passwordCard" class="auth-card" hidden>
      <h1 class="auth-title">비밀번호 변경</h1>
      <p class="auth-subtitle">최초 로그인으로 확인되었습니다. 계속하려면 새 비밀번호로 변경해 주세요.</p>
      <div class="auth-field">
        <label class="auth-label" for="newPassword">새 비밀번호</label>
        <input id="newPassword" class="auth-input" type="password" autocomplete="new-password" placeholder="새 비밀번호 입력" />
      </div>
      <div class="auth-field">
        <label class="auth-label" for="confirmPassword">새 비밀번호 확인</label>
        <input id="confirmPassword" class="auth-input" type="password" autocomplete="new-password" placeholder="한 번 더 입력" />
      </div>
      <div class="auth-actions">
        <button id="changePasswordButton" class="auth-btn primary" type="button">비밀번호 변경</button>
      </div>
      <div id="passwordError" class="auth-error"></div>
      <div id="passwordSuccess" class="auth-success"></div>
      <div class="auth-helper">영문, 숫자, 특수문자를 조합해 8자 이상을 권장합니다.</div>
    </div>
  </div>
  <div class="app">
    <div class="layout">
      <div>
        <div id="home-page" class="home-root">
          <div class="tabs workspace-tabs">
            <button class="pill active" data-tab="memo">메모</button>
            <button class="pill" data-tab="schedule">일정·예약</button>
          </div>

          <div id="tab-content" class="content"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="./js/portal-home-core.js"></script>
<script src="./js/portal-home-org.js"></script>
<script src="./js/portal-home-memo.js"></script>
<script src="./js/portal-home-reservation.js"></script>
<script src="./js/portal-home-schedule.js"></script>
<script src="./js/portal-home-main.js"></script>

<script>
(function () {
  'use strict';

  const PORTAL_HOME_TABS = [
    { id: 'memo', label: '메모' },
    { id: 'schedule', label: '일정/예약' }
  ];

  function getActiveTabId() {
    const active = document.querySelector('.workspace-tabs .pill.active[data-tab]');
    return active ? active.getAttribute('data-tab') : 'memo';
  }

  function notifyPortalTabs() {
    if (!window.parent || window.parent === window) return;
    window.parent.postMessage({
      type: 'portal-tabs-ready',
      tabs: PORTAL_HOME_TABS,
      activeTabId: getActiveTabId(),
      source: 'portal-home'
    }, '*');
  }

  function notifyPortalActiveTab(tabId) {
    if (!window.parent || window.parent === window || !tabId) return;
    window.parent.postMessage({
      type: 'portal-tab-active',
      activeTabId: tabId,
      tabId: tabId,
      source: 'portal-home'
    }, '*');
  }

  function activatePortalHomeTab(tabId) {
    const target = document.querySelector('.workspace-tabs .pill[data-tab="' + tabId + '"]');
    if (!target) return false;

    target.click();
    notifyPortalActiveTab(tabId);
    return true;
  }

  window.portalTabs = PORTAL_HOME_TABS;
  window.portalActivateTab = activatePortalHomeTab;

  window.addEventListener('message', function (event) {
    const payload = event && event.data ? event.data : {};

    if (payload.type === 'portal-tabs-request') {
      notifyPortalTabs();
      return;
    }

    if (payload.type === 'portal-tab-change') {
      const tabId = payload.tabId || payload.tab || '';
      activatePortalHomeTab(tabId);
    }
  });

  document.addEventListener('click', function (event) {
    const btn = event.target && event.target.closest
      ? event.target.closest('.workspace-tabs .pill[data-tab]')
      : null;

    if (!btn) return;
    notifyPortalActiveTab(btn.getAttribute('data-tab'));
  });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', notifyPortalTabs);
  } else {
    notifyPortalTabs();
  }

  setTimeout(notifyPortalTabs, 300);
  setTimeout(notifyPortalTabs, 900);
})();
</script>



<script src="./js/portal-home-iframe-fit.js"></script>


<script src="./js/portal-home-auth.js"></script>


<script src="./js/portal-home-auth-session.js"></script>
