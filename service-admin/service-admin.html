<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExeloLab Service Admin</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .page {
      min-height: 100vh;
      padding: 24px 24px 24px 0;
    }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
      width: fit-content;
      max-width: 100%;
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 18px;
      color: #0f172a;
      letter-spacing: -0.02em;
    }
    .card p {
      margin: 0;
      font-size: 13px;
      color: #64748b;
      line-height: 1.6;
    }
    .view { display: none; }
    .view.active { display: block; }
    .form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      margin-top: 16px;
      align-items: end;
      width: var(--admin-content-width, 650px);
      max-width: 100%;
    }
    .form-fields {
      width: 100%;
      min-width: 0;
    }
    .form-actions {
      display: flex;
      gap: 6px;
      align-items: flex-end;
      flex-wrap: nowrap;
    }
    .field {
      display: grid;
      gap: 6px;
    }
    .field label {
      font-size: 12px;
      font-weight: 800;
      color: #475569;
    }
    .input, .select {
      height: 40px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 0 12px;
      font-size: 13px;
      color: #0f172a;
      background: #fff;
      outline: none;
    }
    .input:focus, .select:focus {
      border-color: #0f172a;
      box-shadow: 0 0 0 3px rgba(15,23,42,.08);
    }
    .btn {
      height: 40px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #0f172a;
      padding: 0 14px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn.primary {
      background: #0f172a;
      color: #fff;
      border-color: #0f172a;
    }
    .btn.danger {
      color: #dc2626;
      border-color: #fecaca;
      background: #fff;
    }
    .btn.soft {
      background: #f8fafc;
      color: #334155;
    }
    .btn:disabled {
      cursor: not-allowed;
      opacity: .5;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin: 16px 0 10px;
      flex-wrap: wrap;
      width: var(--admin-content-width, 650px);
      max-width: 100%;
    }
    .company-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
      justify-items: start;
      width: var(--admin-content-width, 650px);
      max-width: 100%;
    }
    .company-item {
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 13px 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      background: #fff;
      width: 100%;
      max-width: 100%;
      justify-self: start;
    }
    .company-summary {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex-wrap: nowrap;
      width: fit-content;
      max-width: 100%;
    }
    .company-edit-line {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex-wrap: nowrap;
      width: fit-content;
      max-width: 100%;
    }
    .company-summary[hidden],
    .company-edit-line[hidden],
    .company-actions .btn[hidden] {
      display: none !important;
    }
    .company-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: flex-start;
      flex-wrap: nowrap;
      margin-left: 4px;
    }
    .label {
      font-size: 13px;
      color: #64748b;
      font-weight: 800;
      white-space: nowrap;
    }
    .company-name-text,
    .company-domain-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #0f172a;
      font-weight: 900;
      font-size: 14px;
    }
    .company-name-text {
      width: var(--company-name-col, auto);
      max-width: 260px;
    }
    .company-domain-text {
      width: var(--company-domain-col, auto);
      max-width: 360px;
    }
    .company-separator {
      color: #cbd5e1;
      font-weight: 900;
    }
    .company-edit-line .domain-input-wrap {
      width: var(--company-domain-input-col, 300px);
      flex: 0 0 auto;
    }
    .company-domain-text a {
      color: #0f766e;
      text-decoration: none;
    }
    .company-domain-text a:hover { text-decoration: underline; }
    .company-title-input {
      width: var(--company-name-input-col, 190px);
      height: 40px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 0 12px;
      font-size: 14px;
      font-weight: 800;
      color: #0f172a;
      background: #fff;
      outline: none;
    }
    .company-title-input:focus {
      border-color: #0f172a;
      box-shadow: 0 0 0 3px rgba(15,23,42,.08);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      color: #475569;
      white-space: nowrap;
    }
    .badge.active {
      background: #dcfce7;
      border-color: #bbf7d0;
      color: #15803d;
    }
    .badge.inactive {
      background: #f1f5f9;
      color: #64748b;
    }
    .domain-field {
      display: grid;
      gap: 6px;
      margin-top: 10px;
    }
    .domain-input-wrap {
      min-height: 40px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      background: #fff;
      display: grid;
      grid-template-columns: auto minmax(120px, 1fr) auto;
      align-items: center;
      overflow: hidden;
      max-width: 100%;
    }
    .domain-prefix,
    .domain-suffix {
      height: 100%;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      font-size: 13px;
      font-weight: 800;
      color: #64748b;
      background: #f8fafc;
      white-space: nowrap;
    }
    .domain-prefix { border-right: 1px solid #e2e8f0; }
    .domain-suffix { border-left: 1px solid #e2e8f0; }
    .domain-input {
      height: 38px;
      border: 0;
      outline: none;
      padding: 0 10px;
      font-size: 13px;
      font-weight: 900;
      color: #0f172a;
      min-width: 0;
      background: #fff;
    }
    .domain-input-wrap:focus-within {
      border-color: #0f172a;
      box-shadow: 0 0 0 3px rgba(15,23,42,.08);
    }
    .domain-preview {
      font-size: 12px;
      color: #64748b;
      line-height: 1.5;
    }
    .apps {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }
    .app-row {
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 13px 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      background: #fff;
    }
    .app-name {
      font-size: 14px;
      font-weight: 900;
    }
    .app-key {
      margin-top: 4px;
      font-size: 12px;
      color: #64748b;
      font-weight: 700;
    }
    .toggle {
      position: relative;
      width: 50px;
      height: 28px;
      border-radius: 999px;
      border: none;
      background: #cbd5e1;
      cursor: pointer;
      transition: .15s ease;
      flex: 0 0 auto;
    }
    .toggle::after {
      content: "";
      position: absolute;
      top: 4px;
      left: 4px;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: #fff;
      transition: .15s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,.18);
    }
    .toggle.on {
      background: #0f172a;
    }
    .toggle.on::after {
      left: 26px;
    }
    .notice, .feedback {
      margin-top: 16px;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.65;
    }
    .notice {
      border: 1px dashed #cbd5e1;
      color: #64748b;
      background: #fff;
    }
    .feedback {
      display: none;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      color: #475569;
      font-weight: 700;
      width: calc(var(--admin-content-width, 650px) + 44px);
      max-width: 100%;
    }
    .feedback.show { display: block; }
    .feedback.ok {
      border-color: #bbf7d0;
      background: #f0fdf4;
      color: #15803d;
    }
    .feedback.error {
      border-color: #fecaca;
      background: #fef2f2;
      color: #b91c1c;
    }
    .empty {
      padding: 24px;
      text-align: center;
      color: #94a3b8;
      border: 1px dashed #cbd5e1;
      border-radius: 16px;
      background: #fff;
      font-size: 13px;
    }
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .detail-title {
      display: grid;
      gap: 4px;
    }
    .detail-title strong {
      font-size: 18px;
      color: #0f172a;
      letter-spacing: -0.02em;
    }
    .detail-title span {
      font-size: 12px;
      color: #64748b;
      font-weight: 700;
    }
    .detail-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .company-code-hidden { display: none; }

    @media (max-width: 1100px) {
      .page { padding: 18px; }
      .card { width: 100%; }
      .form {
        grid-template-columns: 1fr;
        width: 100%;
      }
      .form-fields {
        width: 100%;
      }
      .form-actions {
        justify-content: flex-start;
        flex-wrap: wrap;
      }
      .company-item {
        display: grid;
        grid-template-columns: 1fr;
        width: 100%;
      }
      .company-actions { justify-content: flex-start; }
    }

    @media (max-width: 760px) {
      .company-summary,
      .company-edit-line {
        flex-wrap: wrap;
        width: 100%;
        gap: 7px;
      }
      .company-name-text,
      .company-domain-text,
      .company-title-input,
      .company-edit-line .domain-input-wrap {
        width: 100% !important;
        max-width: 100%;
      }
      .company-separator {
        display: none;
      }
      .company-actions {
        flex-wrap: wrap;
        margin-left: 0;
      }
    }
  </style>
  <link rel="stylesheet" href="./assets/css/common-ui.css">
</head>
<body>
  <main class="page el-page">
    <section id="companiesView" class="view active">
      <article class="card el-card">
        <h2>회사 관리</h2>
        <p>회사명과 서브도메인을 등록합니다. company_code는 내부 식별값으로 자동 생성됩니다.</p>

        <div class="form">
          <div class="form-fields">
            <div class="field">
              <label for="companyNameInput">회사명</label>
              <input id="companyNameInput" class="input el-input" placeholder="예: 삼천당제약" autocomplete="off">
            </div>
            <div class="domain-field">
              <label for="companySubdomainInput">접속주소</label>
              <div class="domain-input-wrap el-domain-wrap">
                <span class="domain-prefix">https://</span>
                <input id="companySubdomainInput" class="domain-input" placeholder="" autocomplete="off" spellcheck="false">
                <span class="domain-suffix">.ops.exelolab.com</span>
              </div>
              <div class="domain-preview" id="companyDomainPreview">접속주소: https://[서브도메인].ops.exelolab.com</div>
            </div>
          </div>
          <div class="form-actions">
            <button id="createCompanyBtn" class="btn el-btn el-btn-primary primary" type="button">등록</button>
            <button id="cancelCompanyInputBtn" class="btn el-btn" type="button">취소</button>
            <button id="refreshCompaniesBtn" class="btn el-btn" type="button">새로고침</button>
          </div>
        </div>

        <div class="toolbar">
          <div class="badge el-badge" id="companyCountBadge">회사 0개</div>
        </div>

        <div id="companyList" class="company-list">
          <div class="empty">회사 목록을 불러오는 중입니다.</div>
        </div>
      </article>
    </section>

    <section id="appsView" class="view">
      <article class="card el-card">
        <div class="detail-header">
          <div class="detail-title">
            <strong id="appsViewTitle">앱 사용 설정</strong>
            <span id="appsViewDesc">선택한 회사에서 사용할 앱을 켜고 끕니다.</span>
          </div>
          <div class="detail-actions">
            <button id="cancelAppsBtn" class="btn el-btn" type="button">목록으로</button>
            <button id="saveAppsBtn" class="btn el-btn el-btn-primary primary" type="button">저장</button>
          </div>
        </div>

        <div id="appsWrap" class="apps">
          <div class="empty">앱 설정을 불러오는 중입니다.</div>
        </div>

        <div class="notice el-notice">
          앱 ON/OFF 변경 후 <strong>저장</strong>을 누르면 반영되고 회사 목록으로 돌아갑니다.
        </div>
      </article>
    </section>

    <div id="feedback" class="feedback el-feedback"></div>
  </main>

<script>
(function () {
  'use strict';

  const DEFAULT_APPS = [
    { app_key: 'portal-home', app_name: '워크스페이스' },
    { app_key: 'attendance', app_name: '근태' },
    { app_key: 'wastewater', app_name: '폐수' },
    { app_key: 'reagent', app_name: '시약·초자' },
    { app_key: 'research-staff', app_name: '인력운영' }
  ];

  const els = {
    companiesView: document.getElementById('companiesView'),
    appsView: document.getElementById('appsView'),
    companyNameInput: document.getElementById('companyNameInput'),
    companySubdomainInput: document.getElementById('companySubdomainInput'),
    companyDomainPreview: document.getElementById('companyDomainPreview'),
    createCompanyBtn: document.getElementById('createCompanyBtn'),
    cancelCompanyInputBtn: document.getElementById('cancelCompanyInputBtn'),
    refreshCompaniesBtn: document.getElementById('refreshCompaniesBtn'),
    companyList: document.getElementById('companyList'),
    companyCountBadge: document.getElementById('companyCountBadge'),
    appsViewTitle: document.getElementById('appsViewTitle'),
    appsViewDesc: document.getElementById('appsViewDesc'),
    appsWrap: document.getElementById('appsWrap'),
    saveAppsBtn: document.getElementById('saveAppsBtn'),
    cancelAppsBtn: document.getElementById('cancelAppsBtn'),
    feedback: document.getElementById('feedback')
  };

  let companies = [];
  let selectedCompanyId = '';
  let currentApps = [];
  let appDraft = new Map();

  function getParentSession() {
    try {
      if (window.parent && typeof window.parent.getPortalSession === 'function') {
        return window.parent.getPortalSession();
      }
    } catch (_) {}
    return null;
  }

  function getSupabaseClient() {
    const session = getParentSession();
    if (session && session.supabase) return session.supabase;

    try {
      if (window.parent && window.parent.portalSupabase) return window.parent.portalSupabase;
    } catch (_) {}

    return window.portalSupabase || null;
  }

  function isServiceAdmin() {
    const session = getParentSession();
    const role = String(session?.role || session?.profile?.role || '').trim();
    return role === 'service_admin';
  }

  function sb() {
    const client = getSupabaseClient();
    if (!client) throw new Error('Supabase 연결을 찾지 못했습니다. 포탈 안에서 다시 열어주세요.');
    return client;
  }

  function setFeedback(message, type = '') {
    if (!els.feedback) return;
    els.feedback.textContent = message || '';
    els.feedback.className = 'feedback' + (message ? ' show' : '') + (type ? ' ' + type : '');
  }

  function showView(viewName) {
    els.companiesView?.classList.toggle('active', viewName === 'companies');
    els.appsView?.classList.toggle('active', viewName === 'apps');
  }

  function generateCompanyCode() {
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');
    const random = Math.random().toString(36).slice(2, 6).toUpperCase();
    return `COMP-${yyyy}${mm}${dd}-${random}`;
  }

  async function generateUniqueCompanyCode() {
    for (let i = 0; i < 8; i += 1) {
      const code = generateCompanyCode();
      const { data, error } = await sb()
        .from('companies')
        .select('id')
        .eq('company_code', code)
        .maybeSingle();

      if (error) throw error;
      if (!data) return code;
    }

    throw new Error('회사코드 자동 생성에 실패했습니다. 다시 시도해 주세요.');
  }

  function normalizeSubdomain(value) {
    return String(value || '')
      .trim()
      .toLowerCase()
      .replace(/^https?:\/\//, '')
      .replace(/\.ops\.exelolab\.com\/?$/i, '')
      .replace(/[^a-z0-9-]/g, '');
  }

  function isValidSubdomain(value) {
    const subdomain = String(value || '').trim();
    if (!subdomain) return false;
    if (subdomain.length < 2 || subdomain.length > 40) return false;
    if (!/^[a-z0-9](?:[a-z0-9-]*[a-z0-9])$/.test(subdomain)) return false;

    const reserved = new Set(['www', 'api', 'admin', 'root', 'mail', 'email', 'smtp', 'ftp', 'cdn', 'assets', 'static', 'support', 'help', 'login', 'portal', 'ops', 'app', 'apps']);
    return !reserved.has(subdomain);
  }

  function getCompanyUrl(subdomain) {
    const clean = normalizeSubdomain(subdomain);
    return clean ? `https://${clean}.ops.exelolab.com` : '';
  }

  function getCompanyDisplayDomain(subdomain) {
    const clean = normalizeSubdomain(subdomain);
    return clean ? `${clean}.ops.exelolab.com` : '';
  }

  function updateDomainPreview() {
    if (!els.companyDomainPreview || !els.companySubdomainInput) return;
    const subdomain = normalizeSubdomain(els.companySubdomainInput.value);
    els.companyDomainPreview.textContent = subdomain
      ? `접속주소: ${getCompanyUrl(subdomain)}`
      : '접속주소: https://[서브도메인].ops.exelolab.com';
  }

  function resetCompanyInputForm() {
    if (els.companyNameInput) els.companyNameInput.value = '';
    if (els.companySubdomainInput) els.companySubdomainInput.value = '';
    updateDomainPreview();
    setFeedback('', '');
  }

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, (m) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
    }[m]));
  }

  function assertServiceAdmin() {
    if (!isServiceAdmin()) {
      throw new Error('서비스 관리자 권한이 필요합니다.');
    }
  }

  async function ensureCompanyApps(companyId) {
    const rows = DEFAULT_APPS.map(app => ({
      company_id: companyId,
      app_key: app.app_key,
      app_name: app.app_name,
      is_enabled: true
    }));

    const { error } = await sb()
      .from('company_apps')
      .upsert(rows, { onConflict: 'company_id,app_key' });

    if (error) throw error;
  }

  async function loadCompanies() {
    assertServiceAdmin();
    setFeedback('회사 목록을 불러오는 중입니다.', '');

    const { data, error } = await sb()
      .from('companies')
      .select('id, company_name, company_code, subdomain, is_active, created_at')
      .order('created_at', { ascending: true });

    if (error) throw error;

    companies = data || [];
    renderCompanies();
    setFeedback('회사 목록을 불러왔습니다.', 'ok');
  }

  function setAdminContentWidth(width) {
    const safeWidth = Math.min(Math.max(Number(width) || 650, 620), 860);
    document.documentElement.style.setProperty('--admin-content-width', safeWidth + 'px');
  }

  function calculateCompanyShellWidth(nameColWidth, domainColWidth) {
    const summaryBase = 52 + 34 + 10 + 34 + 50;
    const actionBase = 64 + 50 + 62 + 50 + 18;
    const cardPaddingAndGap = 28 + 14;
    return summaryBase + nameColWidth + domainColWidth + actionBase + cardPaddingAndGap;
  }

  function renderCompanies() {
    els.companyCountBadge.textContent = '회사 ' + companies.length + '개';

    const maxNameLen = Math.max(8, ...companies.map(company => String(company.company_name || '-').length));
    const maxDomainLen = Math.max(18, ...companies.map(company => getCompanyDisplayDomain(company.subdomain || '').length || 0));
    const nameColWidth = Math.min(Math.max(maxNameLen * 14 + 18, 120), 260);
    const domainColWidth = Math.min(Math.max(maxDomainLen * 8 + 24, 190), 360);
    const nameInputWidth = Math.min(Math.max(maxNameLen * 14 + 42, 170), 300);
    const domainInputWidth = Math.min(Math.max(maxDomainLen * 8 + 86, 260), 430);
    setAdminContentWidth(calculateCompanyShellWidth(nameColWidth, domainColWidth));

    if (!companies.length) {
      els.companyList.innerHTML = '<div class="empty">등록된 회사가 없습니다.</div>';
      return;
    }

    els.companyList.innerHTML = companies.map(company => {
      const active = company.is_active !== false;
      const subdomain = normalizeSubdomain(company.subdomain || '');
      const companyUrl = getCompanyUrl(subdomain);
      const displayDomain = getCompanyDisplayDomain(subdomain);

      return `
        <div class="company-item el-company-item" data-company-row="${escapeHtml(company.id)}" data-editing="false" style="--company-name-col:${nameColWidth}px; --company-domain-col:${domainColWidth}px; --company-name-input-col:${nameInputWidth}px; --company-domain-input-col:${domainInputWidth}px;">
          <div class="company-summary" data-company-view="${escapeHtml(company.id)}">
            <span class="badge ${active ? 'active' : 'inactive'}">${active ? '활성' : '비활성'}</span>
            <span class="label">회사:</span>
            <span class="company-name-text" title="${escapeHtml(company.company_name || '-')}">${escapeHtml(company.company_name || '-')}</span>
            <span class="company-separator">│</span>
            <span class="label">주소:</span>
            <span class="company-domain-text" title="${escapeHtml(displayDomain || '주소 미설정')}">
              ${
                companyUrl
                  ? `<a href="${escapeHtml(companyUrl)}" target="_blank" rel="noopener">${escapeHtml(displayDomain)}</a>`
                  : '주소 미설정'
              }
            </span>
            <span class="company-code-hidden">code: ${escapeHtml(company.company_code || '-')}</span>
          </div>

          <div class="company-edit-line" data-company-edit-grid="${escapeHtml(company.id)}" hidden>
            <span class="badge ${active ? 'active' : 'inactive'}">${active ? '활성' : '비활성'}</span>
            <span class="label">회사:</span>
            <input
              class="company-title-input"
              data-edit-company-name="${escapeHtml(company.id)}"
              value="${escapeHtml(company.company_name || '')}"
            >
            <span class="company-separator">│</span>
            <span class="label">주소:</span>
            <div class="domain-input-wrap el-domain-wrap">
              <span class="domain-prefix">https://</span>
              <input
                class="domain-input"
                data-edit-company-subdomain="${escapeHtml(company.id)}"
                value="${escapeHtml(subdomain)}"
                placeholder=""
                autocomplete="off"
                spellcheck="false"
              >
              <span class="domain-suffix">.ops.exelolab.com</span>
            </div>
          </div>

          <div class="company-actions">
            <button type="button" class="btn el-btn" data-open-apps="${escapeHtml(company.id)}">앱설정</button>
            <button type="button" class="btn el-btn" data-edit-company="${escapeHtml(company.id)}">수정</button>
            <button type="button" class="btn el-btn el-btn-primary primary" data-save-company="${escapeHtml(company.id)}" hidden>저장</button>
            <button type="button" class="btn el-btn" data-cancel-company-edit="${escapeHtml(company.id)}" hidden>취소</button>
            <button
              type="button"
              class="btn ${active ? 'danger' : 'primary'}"
              data-toggle-company="${escapeHtml(company.id)}"
              data-next-active="${active ? 'false' : 'true'}"
            >
              ${active ? '비활성' : '활성'}
            </button>
            <button type="button" class="btn el-btn el-btn-danger danger" data-delete-company="${escapeHtml(company.id)}">삭제</button>
          </div>
        </div>
      `;
    }).join('');
  }

  async function createCompany() {
    assertServiceAdmin();

    const name = String(els.companyNameInput.value || '').trim();
    const subdomain = normalizeSubdomain(els.companySubdomainInput?.value || '');

    if (!name) {
      setFeedback('회사명을 입력해 주세요.', 'error');
      return;
    }

    if (!isValidSubdomain(subdomain)) {
      setFeedback('서브도메인은 영문 소문자, 숫자, 하이픈만 사용할 수 있으며 2~40자여야 합니다. 예약어는 사용할 수 없습니다.', 'error');
      return;
    }

    els.createCompanyBtn.disabled = true;
    setFeedback('회사코드와 접속주소를 등록하는 중입니다.', '');

    try {
      const code = await generateUniqueCompanyCode();

      const { data, error } = await sb()
        .from('companies')
        .insert({
          company_name: name,
          company_code: code,
          subdomain,
          is_active: true
        })
        .select('id')
        .single();

      if (error) throw error;

      await ensureCompanyApps(data.id);

      resetCompanyInputForm();
      selectedCompanyId = data.id;

      await loadCompanies();
      setFeedback(`회사 등록이 완료되었습니다. 접속주소: ${getCompanyUrl(subdomain)}`, 'ok');
    } catch (error) {
      console.error(error);
      setFeedback(error.message || '회사 등록 중 오류가 발생했습니다.', 'error');
    } finally {
      els.createCompanyBtn.disabled = false;
    }
  }

  async function toggleCompanyActive(companyId, nextActive) {
    assertServiceAdmin();
    setFeedback('회사 상태를 변경하는 중입니다.', '');

    const { error } = await sb()
      .from('companies')
      .update({ is_active: nextActive })
      .eq('id', companyId);

    if (error) throw error;

    await loadCompanies();
    setFeedback('회사 상태를 변경했습니다.', 'ok');
  }

  async function updateCompanyInfo(companyId, nextName, nextSubdomain) {
    assertServiceAdmin();

    const name = String(nextName || '').trim();
    const subdomain = normalizeSubdomain(nextSubdomain || '');

    if (!name) {
      setFeedback('수정할 회사명을 입력해 주세요.', 'error');
      return;
    }

    if (!isValidSubdomain(subdomain)) {
      setFeedback('서브도메인은 영문 소문자, 숫자, 하이픈만 사용할 수 있으며 2~40자여야 합니다. 예약어는 사용할 수 없습니다.', 'error');
      return;
    }

    const company = companies.find(item => item.id === companyId);
    const beforeSubdomain = normalizeSubdomain(company?.subdomain || '');

    if (beforeSubdomain && beforeSubdomain !== subdomain) {
      const ok = confirm(
        `접속주소를 변경하시겠습니까?\n\n` +
        `기존 주소: ${getCompanyUrl(beforeSubdomain)}\n` +
        `변경 주소: ${getCompanyUrl(subdomain)}\n\n` +
        `운영 중인 회사라면 기존 사용자는 새 주소로 접속해야 합니다.`
      );
      if (!ok) return;
    }

    setFeedback('회사 정보를 수정하는 중입니다.', '');

    const { error } = await sb()
      .from('companies')
      .update({ company_name: name, subdomain })
      .eq('id', companyId);

    if (error) throw error;

    showCompanyEdit(companyId, false);
    await loadCompanies();
    setFeedback('회사 정보를 수정했습니다.', 'ok');
  }

  async function deleteCompany(companyId) {
    assertServiceAdmin();

    const company = companies.find(item => item.id === companyId);
    const name = company?.company_name || '선택한 회사';

    const ok = confirm(`${name} 회사를 삭제하시겠습니까?\n\ncompany_apps도 함께 삭제됩니다. 이미 연결된 사용자나 업무 데이터가 있으면 삭제가 실패할 수 있습니다.`);
    if (!ok) return;

    setFeedback('회사를 삭제하는 중입니다.', '');

    const { error } = await sb()
      .from('companies')
      .delete()
      .eq('id', companyId);

    if (error) throw error;

    if (selectedCompanyId === companyId) {
      selectedCompanyId = '';
    }

    await loadCompanies();
    setFeedback('회사를 삭제했습니다.', 'ok');
  }

  function showCompanyEdit(companyId, show) {
    const row = document.querySelector(`[data-company-row="${CSS.escape(companyId)}"]`);
    if (!row) return;

    const view = row.querySelector(`[data-company-view="${CSS.escape(companyId)}"]`);
    const editGrid = row.querySelector(`[data-company-edit-grid="${CSS.escape(companyId)}"]`);
    const nameInput = row.querySelector(`[data-edit-company-name="${CSS.escape(companyId)}"]`);
    const subdomainInput = row.querySelector(`[data-edit-company-subdomain="${CSS.escape(companyId)}"]`);
    const editBtn = row.querySelector(`[data-edit-company="${CSS.escape(companyId)}"]`);
    const saveBtn = row.querySelector(`[data-save-company="${CSS.escape(companyId)}"]`);
    const cancelBtn = row.querySelector(`[data-cancel-company-edit="${CSS.escape(companyId)}"]`);
    const appsBtn = row.querySelector(`[data-open-apps="${CSS.escape(companyId)}"]`);
    const toggleBtn = row.querySelector('[data-toggle-company]');
    const deleteBtn = row.querySelector('[data-delete-company]');
    const company = companies.find(item => item.id === companyId);

    row.dataset.editing = show ? 'true' : 'false';

    if (view) view.hidden = show;
    if (editGrid) editGrid.hidden = !show;

    if (show) {
      if (nameInput) nameInput.value = company?.company_name || '';
      if (subdomainInput) subdomainInput.value = normalizeSubdomain(company?.subdomain || '');
      setTimeout(() => {
        nameInput?.focus();
        nameInput?.select();
      }, 0);
    }

    if (appsBtn) appsBtn.hidden = show;
    if (editBtn) editBtn.hidden = show;
    if (saveBtn) {
      saveBtn.hidden = !show;
      saveBtn.disabled = false;
    }
    if (cancelBtn) cancelBtn.hidden = !show;
    if (toggleBtn) toggleBtn.hidden = show;
    if (deleteBtn) deleteBtn.hidden = show;
  }

  function getCompanyById(companyId) {
    return companies.find(item => item.id === companyId) || null;
  }

  async function openAppsView(companyId) {
    const company = getCompanyById(companyId);
    if (!company) return;

    selectedCompanyId = companyId;
    currentApps = [];
    appDraft = new Map();

    const displayDomain = getCompanyDisplayDomain(company.subdomain || '');

    if (els.appsViewTitle) els.appsViewTitle.textContent = `${company.company_name || '선택 회사'} 앱 사용 설정`;
    if (els.appsViewDesc) els.appsViewDesc.textContent = displayDomain || '접속주소 미설정';

    els.appsWrap.innerHTML = '<div class="empty">앱 설정을 불러오는 중입니다.</div>';
    showView('apps');
    await loadCompanyApps(companyId);
  }

  function returnToCompaniesView(message, type = 'ok') {
    showView('companies');
    if (message) setFeedback(message, type);
  }

  async function loadCompanyApps(companyId) {
    assertServiceAdmin();

    if (!companyId) {
      els.appsWrap.innerHTML = '<div class="empty">회사 정보가 없습니다.</div>';
      return;
    }

    await ensureCompanyApps(companyId);

    const { data, error } = await sb()
      .from('company_apps')
      .select('id, company_id, app_key, app_name, is_enabled')
      .eq('company_id', companyId)
      .order('app_key', { ascending: true });

    if (error) throw error;

    currentApps = data || [];
    appDraft = new Map(currentApps.map(app => [app.id, app.is_enabled !== false]));
    renderApps();
  }

  function renderApps() {
    if (!currentApps.length) {
      els.appsWrap.innerHTML = '<div class="empty">앱 설정이 없습니다.</div>';
      return;
    }

    const order = DEFAULT_APPS.map(a => a.app_key);
    const apps = [...currentApps].sort((a, b) => order.indexOf(a.app_key) - order.indexOf(b.app_key));

    els.appsWrap.innerHTML = apps.map(app => {
      const enabled = appDraft.get(app.id) !== false;
      return `
        <div class="app-row el-app-row">
          <div>
            <div class="app-name">${escapeHtml(app.app_name || app.app_key)}</div>
            <div class="app-key">key: ${escapeHtml(app.app_key)}</div>
          </div>
          <button
            type="button"
            class="toggle el-toggle ${enabled ? 'on' : ''}"
            data-draft-toggle-app="${escapeHtml(app.id)}"
            aria-label="${escapeHtml(app.app_name || app.app_key)} 사용 설정"
          ></button>
        </div>
      `;
    }).join('');
  }

  async function saveCompanyApps() {
    assertServiceAdmin();

    if (!selectedCompanyId) {
      setFeedback('선택된 회사가 없습니다.', 'error');
      return;
    }

    const updates = currentApps
      .filter(app => (app.is_enabled !== false) !== (appDraft.get(app.id) !== false))
      .map(app => ({
        id: app.id,
        is_enabled: appDraft.get(app.id) !== false
      }));

    if (!updates.length) {
      returnToCompaniesView('변경된 앱 설정이 없습니다.', 'ok');
      return;
    }

    els.saveAppsBtn.disabled = true;
    setFeedback('앱 사용 설정을 저장하는 중입니다.', '');

    try {
      for (const item of updates) {
        const { error } = await sb()
          .from('company_apps')
          .update({ is_enabled: item.is_enabled, updated_at: new Date().toISOString() })
          .eq('id', item.id);

        if (error) throw error;
      }

      await loadCompanies();
      returnToCompaniesView('앱 사용 설정을 저장했습니다.', 'ok');
    } catch (error) {
      console.error(error);
      setFeedback(error.message || '앱 설정 저장 중 오류가 발생했습니다.', 'error');
    } finally {
      els.saveAppsBtn.disabled = false;
    }
  }

  function bindEvents() {
    els.createCompanyBtn.addEventListener('click', () => createCompany());
    els.cancelCompanyInputBtn?.addEventListener('click', () => resetCompanyInputForm());

    els.companySubdomainInput?.addEventListener('input', () => {
      els.companySubdomainInput.value = normalizeSubdomain(els.companySubdomainInput.value);
      updateDomainPreview();
    });

    els.companyNameInput?.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        createCompany();
      }
    });
    els.companySubdomainInput?.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        createCompany();
      }
    });

    els.refreshCompaniesBtn.addEventListener('click', () => {
      loadCompanies().catch(error => {
        console.error(error);
        setFeedback(error.message || '새로고침 중 오류가 발생했습니다.', 'error');
      });
    });

    els.cancelAppsBtn.addEventListener('click', () => {
      returnToCompaniesView('', '');
    });

    els.saveAppsBtn.addEventListener('click', () => {
      saveCompanyApps();
    });

    document.addEventListener('keydown', async (event) => {
      const input = event.target.closest('[data-edit-company-name], [data-edit-company-subdomain]');
      if (!input) return;

      const id = input.getAttribute('data-edit-company-name') || input.getAttribute('data-edit-company-subdomain');

      if (event.key === 'Escape') {
        showCompanyEdit(id, false);
        return;
      }

      if (event.key === 'Enter') {
        event.preventDefault();
        const nameInput = document.querySelector(`[data-edit-company-name="${CSS.escape(id)}"]`);
        const subdomainInput = document.querySelector(`[data-edit-company-subdomain="${CSS.escape(id)}"]`);
        try {
          await updateCompanyInfo(id, nameInput?.value || '', subdomainInput?.value || '');
        } catch (error) {
          console.error(error);
          setFeedback(error.message || '회사 정보 수정 중 오류가 발생했습니다.', 'error');
        }
      }
    });

    document.addEventListener('click', async (event) => {
      const openAppsBtn = event.target.closest('[data-open-apps]');
      if (openAppsBtn) {
        const id = openAppsBtn.getAttribute('data-open-apps');
        try {
          await openAppsView(id);
        } catch (error) {
          console.error(error);
          setFeedback(error.message || '앱 설정을 불러오지 못했습니다.', 'error');
          showView('companies');
        }
        return;
      }

      const draftToggleBtn = event.target.closest('[data-draft-toggle-app]');
      if (draftToggleBtn) {
        const id = draftToggleBtn.getAttribute('data-draft-toggle-app');
        appDraft.set(id, !(appDraft.get(id) !== false));
        renderApps();
        return;
      }

      const editBtn = event.target.closest('[data-edit-company]');
      if (editBtn) {
        showCompanyEdit(editBtn.getAttribute('data-edit-company'), true);
        return;
      }

      const cancelEditBtn = event.target.closest('[data-cancel-company-edit]');
      if (cancelEditBtn) {
        showCompanyEdit(cancelEditBtn.getAttribute('data-cancel-company-edit'), false);
        return;
      }

      const saveCompanyBtn = event.target.closest('[data-save-company]');
      if (saveCompanyBtn) {
        const id = saveCompanyBtn.getAttribute('data-save-company');
        const input = document.querySelector(`[data-edit-company-name="${CSS.escape(id)}"]`);
        const subdomainInput = document.querySelector(`[data-edit-company-subdomain="${CSS.escape(id)}"]`);
        saveCompanyBtn.disabled = true;
        try {
          await updateCompanyInfo(id, input?.value || '', subdomainInput?.value || '');
        } catch (error) {
          console.error(error);
          saveCompanyBtn.disabled = false;
          setFeedback(error.message || '회사 정보 수정 중 오류가 발생했습니다.', 'error');
        }
        return;
      }

      const deleteCompanyBtn = event.target.closest('[data-delete-company]');
      if (deleteCompanyBtn) {
        const id = deleteCompanyBtn.getAttribute('data-delete-company');
        try {
          await deleteCompany(id);
        } catch (error) {
          console.error(error);
          setFeedback(error.message || '회사 삭제 중 오류가 발생했습니다.', 'error');
        }
        return;
      }

      const companyBtn = event.target.closest('[data-toggle-company]');
      if (companyBtn) {
        const id = companyBtn.getAttribute('data-toggle-company');
        const next = companyBtn.getAttribute('data-next-active') === 'true';
        try {
          await toggleCompanyActive(id, next);
        } catch (error) {
          console.error(error);
          setFeedback(error.message || '회사 상태 변경 중 오류가 발생했습니다.', 'error');
        }
      }
    });
  }

  async function boot() {
    bindEvents();
    updateDomainPreview();

    if (!isServiceAdmin()) {
      document.body.innerHTML = '<main class="page el-page"><div class="empty">서비스 관리자 권한이 필요합니다.</div></main>';
      return;
    }

    try {
      await loadCompanies();
    } catch (error) {
      console.error(error);
      setFeedback(error.message || '서비스 관리자 정보를 불러오지 못했습니다.', 'error');
      els.companyList.innerHTML = '<div class="empty">회사 목록을 불러오지 못했습니다.</div>';
    }
  }

  boot();
})();
</script>
</body>
</html>
