<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIC | AI Communication</title>

  <link rel="stylesheet" href="../assets/css/common-ui.css" />
  <link rel="stylesheet" href="./css/aic.css" />
  <link rel="stylesheet" href="../common/mobile.css" />
  <link rel="stylesheet" href="../common/theme.css" />

  <style id="aic-participants-style">
    .aic-wide-modal{
      width:min(1040px, 94vw) !important;
      height:min(780px, 88vh);
      max-height:88vh;
      display:flex;
      flex-direction:column;
    }
    .aic-wide-modal > .aic-modal-body{
      min-height:0;
      flex:1 1 auto;
      display:flex;
      flex-direction:column;
    }
    .aic-participant-room-name{
      margin-top:4px;
      font-size:12px;
      font-weight:800;
      color:#64748b;
    }
    .aic-picker-layout{
      min-height:0;
      flex:1 1 auto;
      display:grid;
      grid-template-columns:minmax(0, 1fr) 340px;
      gap:14px;
      margin-top:16px;
    }
    .aic-picker-panel{
      min-height:0;
      border:1px solid #e2e8f0;
      border-radius:16px;
      background:#f8fafc;
      padding:14px;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .aic-picker-panel-title{
      font-size:13px;
      font-weight:900;
      color:#0f172a;
      margin-bottom:10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
    }
    .aic-picker-search-row{
      display:flex;
      gap:8px;
      align-items:center;
      margin-bottom:10px;
    }
    .aic-picker-search-row .module-input{
      flex:1 1 auto;
      min-width:0;
    }
    .aic-picker-results,
    .aic-selected-list,
    .aic-current-list{
      min-height:0;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:8px;
      padding-right:2px;
    }
    .aic-picker-results{
      flex:1 1 auto;
    }
    .aic-current-list{
      flex:1 1 auto;
      max-height:260px;
    }
    .aic-selected-list{
      flex:0 0 auto;
      max-height:190px;
      margin-bottom:12px;
    }
    .aic-user-row{
      display:grid;
      grid-template-columns:22px minmax(0,1fr);
      gap:10px;
      align-items:flex-start;
      padding:11px 12px;
      border:1px solid #e2e8f0;
      border-radius:13px;
      background:#ffffff;
      cursor:pointer;
    }
    .aic-user-row:hover{
      border-color:#93c5fd;
      background:#f0f9ff;
    }
    .aic-user-row input{
      margin-top:3px;
    }
    .aic-user-name{
      font-size:13px;
      font-weight:900;
      color:#0f172a;
      line-height:1.25;
    }
    .aic-user-meta{
      margin-top:4px;
      font-size:11px;
      font-weight:700;
      color:#64748b;
      line-height:1.45;
      word-break:break-all;
    }
    .aic-selected-chip,
    .aic-participant-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border:1px solid #e2e8f0;
      border-radius:12px;
      background:#ffffff;
    }
    .aic-selected-chip{
      background:#eff6ff;
      border-color:#bfdbfe;
    }
    .aic-participant-name{
      font-size:13px;
      font-weight:900;
      color:#0f172a;
    }
    .aic-participant-meta{
      margin-top:3px;
      font-size:11px;
      font-weight:700;
      color:#64748b;
      word-break:break-all;
    }
    .aic-participant-remove,
    .aic-selected-remove{
      height:30px;
      border:1px solid #fecaca;
      border-radius:10px;
      background:#fff;
      color:#b91c1c;
      font-size:11px;
      font-weight:900;
      cursor:pointer;
      padding:0 10px;
      flex:0 0 auto;
    }
    .aic-participant-empty{
      padding:18px 12px;
      text-align:center;
      color:#94a3b8;
      border:1px dashed #cbd5e1;
      border-radius:12px;
      font-size:12px;
      font-weight:800;
      background:#fff;
    }
    .aic-selected-count{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:24px;
      height:22px;
      border-radius:999px;
      background:#dbeafe;
      color:#1d4ed8;
      font-size:11px;
      font-weight:900;
      padding:0 8px;
    }
    .aic-room-right-actions{
      display:flex;
      align-items:center;
      gap:6px;
      flex:0 0 auto;
    }
    .aic-room-delete{
      width:28px;
      height:28px;
      border:none;
      border-radius:999px;
      background:#e2e8f0;
      color:#64748b;
      font-size:18px;
      font-weight:900;
      line-height:1;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:0;
    }
    .aic-room-delete:hover{
      background:#fee2e2;
      color:#b91c1c;
    }
    .aic-chat-input,
    .aic-chat-input input,
    .aic-chat-input select,
    .aic-chat-input button,
    .aic-chat-actions,
    .aic-chat-actions button{
      position:relative;
      z-index:20;
      pointer-events:auto !important;
    }
    @media (max-width:860px){
      .aic-wide-modal{
        width:94vw !important;
        height:88vh;
      }
      .aic-picker-layout{
        grid-template-columns:1fr;
      }
      .aic-current-list{max-height:180px;}
      .aic-selected-list{max-height:150px;}
    }
  </style>

</head>
<body>
  <div id="aicRoot" class="aic-root">
    <aside class="aic-sidebar">
      <div class="aic-sidebar-head">
        <div>
          <div class="aic-title" data-i18n="aic.roomList">회의방 목록</div>
          <div class="aic-subtitle" data-i18n="aic.translationChat">한↔영 번역 채팅</div>
        </div>
        <div class="aic-head-actions">
          <button
            id="aicCreateRoomBtn"
            class="aic-icon-btn primary"
            type="button"
            title="회의방 생성"
            data-i18n-title="aic.createRoom"
            aria-label="회의방 생성"
            data-i18n-aria-label="aic.createRoom"
          >+</button>
          <button
            id="aicSettingsBtn"
            class="aic-icon-btn"
            type="button"
            title="번역 설정"
            data-i18n-title="aic.settings"
            aria-label="번역 설정"
            data-i18n-aria-label="aic.settings"
          >⚙</button>
        </div>
      </div>

      <div id="aicRoomList" class="aic-room-list"></div>
    </aside>

    <main class="aic-main">
      <section class="aic-toolbar">
        <div>
          <div class="aic-title" data-i18n="aic.chatView">채팅창 보기</div>
          <div class="aic-subtitle" data-i18n="aic.chatGuide">회의방은 여러 개, 화면 표시 슬롯은 제한</div>
        </div>
        <div id="aicSlotButtons" class="aic-slot-buttons"></div>
      </section>

      <section id="aicChatSlots" class="aic-slots"></section>
    </main>
  </div>

  <div id="aicRoomModal" class="aic-modal-overlay" hidden>
    <div class="aic-modal aic-wide-modal">
      <div class="aic-modal-body">
        <h2 data-i18n="aic.newRoomTitle">새 회의방 만들기</h2>
        <p data-i18n="aic.newRoomDesc">번역 채팅 회의방을 생성합니다.</p>

        <label class="aic-field">
          <span data-i18n="aic.roomName">회의방 이름</span>
          <input
            id="aicNewRoomName"
            class="module-input"
            placeholder="예: Global R&D Quick Talk"
            data-i18n-placeholder="aic.roomNamePlaceholder"
          />
        </label>

        <div class="aic-picker-layout">
          <section class="aic-picker-panel">
            <div class="aic-picker-panel-title" data-i18n="aic.searchParticipants">참여자 검색</div>
            <div class="aic-picker-search-row">
              <input
                id="aicRoomParticipantSearch"
                class="module-input"
                placeholder="이름 / 이메일 / 본부 / 팀 검색"
                data-i18n-placeholder="aic.participantSearchPlaceholder"
              />
              <button id="aicRoomParticipantSearchBtn" class="module-btn" type="button" data-i18n="aic.search">검색</button>
            </div>
            <div id="aicRoomParticipantResults" class="aic-picker-results">
              <div class="aic-participant-empty" data-i18n="aic.searchParticipantGuide">검색어를 입력해 참여자를 찾으세요.</div>
            </div>
          </section>

          <section class="aic-picker-panel">
            <div class="aic-picker-panel-title">
              <span data-i18n="aic.selectedParticipants">선택된 참여자</span>
              <span id="aicRoomSelectedCount" class="aic-selected-count">0</span>
            </div>
            <div id="aicRoomSelectedParticipants" class="aic-selected-list">
              <div class="aic-participant-empty" data-i18n="aic.noSelectedParticipants">선택된 참여자가 없습니다.</div>
            </div>
            <div class="aic-participant-empty" data-i18n="aic.roomCreatorIncluded">회의방 생성자는 자동으로 포함됩니다.</div>
          </section>
        </div>

        <div class="aic-modal-actions">
          <button id="aicRoomCancelBtn" class="module-btn" type="button" data-i18n="aic.cancel">취소</button>
          <button id="aicRoomCreateConfirmBtn" class="module-btn primary" type="button" data-i18n="aic.create">생성</button>
        </div>
      </div>
    </div>
  </div>

  <div id="aicSettingsModal" class="aic-modal-overlay" hidden>
    <div class="aic-modal">
      <h2 data-i18n="aic.myTranslationSettings">내 번역 기본 설정</h2>
      <p data-i18n="aic.myTranslationSettingsDesc">AIC 회의방에서 사용할 내 언어와 메시지 표시 방식입니다.</p>

      <label class="aic-field">
        <span data-i18n="aic.myLanguage">내 언어</span>
        <select id="aicSetDefaultLang" class="module-select">
          <option value="ko" data-i18n="aic.korean">한국어</option>
          <option value="en" data-i18n="aic.english">English</option>
        </select>
      </label>

      <label class="aic-field">
        <span data-i18n="aic.displayMode">번역 표시 방식</span>
        <select id="aicSetDisplay" class="module-select">
          <option value="original" data-i18n="aic.displayOriginalOnly">원문만 표시</option>
          <option value="translated" data-i18n="aic.displayTranslatedOnly">번역문만 표시</option>
          <option value="both" data-i18n="aic.displayBoth">원문 + 번역 같이 표시</option>
        </select>
      </label>

      <div class="aic-modal-actions">
        <button id="aicSettingsCancelBtn" class="module-btn" type="button" data-i18n="aic.cancel">취소</button>
        <button id="aicSettingsSaveBtn" class="module-btn primary" type="button" data-i18n="aic.save">저장</button>
      </div>
    </div>
  </div>


  <div id="aicParticipantsModal" class="aic-modal-overlay" hidden>
    <div class="aic-modal aic-wide-modal">
      <div class="aic-modal-body">
        <h2 data-i18n="aic.participants">참여자</h2>
        <p data-i18n="aic.participantsDesc">현재 회의방의 참여자를 확인하고 추가합니다.</p>
        <div id="aicParticipantsRoomName" class="aic-participant-room-name"></div>

        <div class="aic-picker-layout">
          <section class="aic-picker-panel">
            <div class="aic-picker-panel-title" data-i18n="aic.searchParticipants">참여자 검색</div>
            <div class="aic-picker-search-row">
              <input
                id="aicInviteParticipantSearch"
                class="module-input"
                placeholder="이름 / 이메일 / 본부 / 팀 검색"
                data-i18n-placeholder="aic.participantSearchPlaceholder"
              />
              <button id="aicInviteParticipantSearchBtn" class="module-btn" type="button" data-i18n="aic.search">검색</button>
            </div>
            <div id="aicInviteParticipantResults" class="aic-picker-results">
              <div class="aic-participant-empty" data-i18n="aic.searchParticipantGuide">검색어를 입력해 참여자를 찾으세요.</div>
            </div>
          </section>

          <section class="aic-picker-panel">
            <div class="aic-picker-panel-title">
              <span data-i18n="aic.selectedParticipants">선택된 참여자</span>
              <span id="aicInviteSelectedCount" class="aic-selected-count">0</span>
            </div>
            <div id="aicInviteSelectedParticipants" class="aic-selected-list">
              <div class="aic-participant-empty" data-i18n="aic.noSelectedParticipants">선택된 참여자가 없습니다.</div>
            </div>

            <div class="aic-picker-panel-title" style="margin-top:12px;">
              <span data-i18n="aic.currentParticipants">현재 참여자</span>
            </div>
            <div id="aicParticipantsList" class="aic-current-list"></div>
          </section>
        </div>

        <div class="aic-modal-actions">
          <button id="aicParticipantsCloseBtn" class="module-btn" type="button" data-i18n="aic.close">닫기</button>
          <button id="aicParticipantAddBtn" class="module-btn primary" type="button" data-i18n="aic.addSelectedParticipants">선택 참여자 추가</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    window.AIC_API = window.AIC_API || {
      translateEndpoint: '/api/aic-translate'
    };
  </script>
  <script src="../assets/i18n/i18n-core.js"></script>
  <script src="./js/aic-config.js"></script>
  <script src="./js/aic-auth.js"></script>
  <script src="./js/aic-portal-bridge.js"></script>
  <script src="./js/aic-main.js"></script>
  <script src="../common/common.js"></script>
  <script>
    if (window.I18N && typeof window.I18N.init === 'function') {
      window.I18N.init();
    }
  </script>
</body>
</html>
