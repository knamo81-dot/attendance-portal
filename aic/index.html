<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIC | AI Communication</title>

  <link rel="stylesheet" href="../assets/css/common-ui.css" />
  <link rel="stylesheet" href="./css/aic.css" />

  <style id="aic-participants-style">
    .aic-participant-room-name{
      margin-top:4px;
      font-size:12px;
      font-weight:800;
      color:#64748b;
    }
    .aic-participant-list{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin:16px 0;
      max-height:260px;
      overflow:auto;
    }
    .aic-participant-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border:1px solid #e2e8f0;
      border-radius:12px;
      background:#f8fafc;
    }
    .aic-participant-name{
      font-size:13px;
      font-weight:900;
      color:#0f172a;
    }
    .aic-participant-meta{
      margin-top:3px;
      font-size:11px;
      font-weight:700;
      color:#64748b;
    }
    .aic-participant-remove{
      height:30px;
      border:1px solid #fecaca;
      border-radius:10px;
      background:#fff;
      color:#b91c1c;
      font-size:11px;
      font-weight:900;
      cursor:pointer;
      padding:0 10px;
      flex:0 0 auto;
    }
    .aic-participant-add-grid{
      display:grid;
      grid-template-columns:1fr 1fr auto;
      gap:8px;
      align-items:end;
      margin-top:12px;
    }
    .aic-participant-empty{
      padding:18px 12px;
      text-align:center;
      color:#94a3b8;
      border:1px dashed #cbd5e1;
      border-radius:12px;
      font-size:12px;
      font-weight:800;
    }
    @media (max-width:760px){
      .aic-participant-add-grid{grid-template-columns:1fr;}
    }
  </style>

</head>
<body>
  <div id="aicRoot" class="aic-root">
    <aside class="aic-sidebar">
      <div class="aic-sidebar-head">
        <div>
          <div class="aic-title" data-i18n="aic.roomList">회의방 목록</div>
          <div class="aic-subtitle" data-i18n="aic.translationChat">한↔영 번역 채팅</div>
        </div>
        <div class="aic-head-actions">
          <button
            id="aicCreateRoomBtn"
            class="aic-icon-btn primary"
            type="button"
            title="회의방 생성"
            data-i18n-title="aic.createRoom"
            aria-label="회의방 생성"
            data-i18n-aria-label="aic.createRoom"
          >+</button>
          <button
            id="aicSettingsBtn"
            class="aic-icon-btn"
            type="button"
            title="번역 설정"
            data-i18n-title="aic.settings"
            aria-label="번역 설정"
            data-i18n-aria-label="aic.settings"
          >⚙</button>
        </div>
      </div>

      <div id="aicRoomList" class="aic-room-list"></div>
    </aside>

    <main class="aic-main">
      <section class="aic-toolbar">
        <div>
          <div class="aic-title" data-i18n="aic.chatView">채팅창 보기</div>
          <div class="aic-subtitle" data-i18n="aic.chatGuide">회의방은 여러 개, 화면 표시 슬롯은 제한</div>
        </div>
        <div id="aicSlotButtons" class="aic-slot-buttons"></div>
      </section>

      <section id="aicChatSlots" class="aic-slots"></section>
    </main>
  </div>

  <div id="aicRoomModal" class="aic-modal-overlay" hidden>
    <div class="aic-modal">
      <h2 data-i18n="aic.newRoomTitle">새 회의방 만들기</h2>
      <p data-i18n="aic.newRoomDesc">번역 채팅 회의방을 생성합니다.</p>

      <label class="aic-field">
        <span data-i18n="aic.roomName">회의방 이름</span>
        <input
          id="aicNewRoomName"
          class="module-input"
          placeholder="예: Global R&D Quick Talk"
          data-i18n-placeholder="aic.roomNamePlaceholder"
        />
      </label>

      <label class="aic-field">
        <span data-i18n="aic.members">참여자</span>
        <input
          id="aicNewRoomMembers"
          class="module-input"
          placeholder="예: 김남호 · Global Director"
          data-i18n-placeholder="aic.membersPlaceholder"
        />
      </label>

      <div class="aic-modal-actions">
        <button id="aicRoomCancelBtn" class="module-btn" type="button" data-i18n="aic.cancel">취소</button>
        <button id="aicRoomCreateConfirmBtn" class="module-btn primary" type="button" data-i18n="aic.create">생성</button>
      </div>
    </div>
  </div>

  <div id="aicSettingsModal" class="aic-modal-overlay" hidden>
    <div class="aic-modal">
      <h2 data-i18n="aic.myTranslationSettings">내 번역 기본 설정</h2>
      <p data-i18n="aic.myTranslationSettingsDesc">AIC 회의방에서 기본 적용되는 개인 번역 설정입니다.</p>

      <label class="aic-field">
        <span data-i18n="aic.defaultInputLang">기본 입력 언어</span>
        <select id="aicSetDefaultLang" class="module-select">
          <option value="ko" data-i18n="aic.koreanInput">한국어 입력</option>
          <option value="en" data-i18n="aic.englishInput">English Input</option>
        </select>
      </label>

      <label class="aic-field">
        <span data-i18n="aic.translationDirection">번역 방향</span>
        <select id="aicSetDirection" class="module-select">
          <option value="auto" data-i18n="aic.autoDetect">자동 감지</option>
          <option value="ko-en" data-i18n="aic.koToEn">한국어 → 영어</option>
          <option value="en-ko" data-i18n="aic.enToKo">영어 → 한국어</option>
        </select>
      </label>

      <label class="aic-field">
        <span data-i18n="aic.translationTone">번역 톤</span>
        <select id="aicSetTone" class="module-select">
          <option value="business" data-i18n="aic.businessTone">비즈니스 영어</option>
          <option value="meeting" data-i18n="aic.meetingTone">간단 회의 영어</option>
          <option value="polite" data-i18n="aic.politeTone">정중한 이메일식 영어</option>
          <option value="casual" data-i18n="aic.casualTone">캐주얼 대화식 영어</option>
        </select>
      </label>

      <label class="aic-field">
        <span data-i18n="aic.displayMode">번역 표시 방식</span>
        <select id="aicSetDisplay" class="module-select">
          <option value="both" data-i18n="aic.displayBoth">원문 + 번역 같이 표시</option>
          <option value="translated" data-i18n="aic.displayTranslatedOnly">번역문만 표시</option>
        </select>
      </label>

      <div class="aic-toggle-row">
        <div>
          <strong data-i18n="aic.autoTranslate">자동번역 사용</strong>
          <span data-i18n="aic.autoTranslateDesc">메시지 전송 시 자동으로 번역문을 생성합니다.</span>
        </div>
        <button
          id="aicAutoTranslateSwitch"
          class="aic-switch on"
          type="button"
          aria-label="자동번역 사용"
          data-i18n-aria-label="aic.autoTranslate"
        ></button>
      </div>

      <div class="aic-modal-actions">
        <button id="aicSettingsCancelBtn" class="module-btn" type="button" data-i18n="aic.cancel">취소</button>
        <button id="aicSettingsSaveBtn" class="module-btn primary" type="button" data-i18n="aic.save">저장</button>
      </div>
    </div>
  </div>


  <div id="aicParticipantsModal" class="aic-modal-overlay" hidden>
    <div class="aic-modal">
      <h2 data-i18n="aic.participants">참여자</h2>
      <p data-i18n="aic.participantsDesc">현재 회의방의 참여자를 확인하고 추가합니다.</p>
      <div id="aicParticipantsRoomName" class="aic-participant-room-name"></div>

      <div id="aicParticipantsList" class="aic-participant-list"></div>

      <div class="aic-participant-add-grid">
        <label class="aic-field">
          <span data-i18n="aic.participantName">이름</span>
          <input
            id="aicParticipantName"
            class="module-input"
            placeholder="예: 김남호"
            data-i18n-placeholder="aic.participantNamePlaceholder"
          />
        </label>
        <label class="aic-field">
          <span data-i18n="aic.participantEmail">이메일/메모</span>
          <input
            id="aicParticipantEmail"
            class="module-input"
            placeholder="예: name@example.com"
            data-i18n-placeholder="aic.participantEmailPlaceholder"
          />
        </label>
        <button id="aicParticipantAddBtn" class="module-btn primary" type="button" data-i18n="aic.add">추가</button>
      </div>

      <div class="aic-modal-actions">
        <button id="aicParticipantsCloseBtn" class="module-btn" type="button" data-i18n="aic.close">닫기</button>
      </div>
    </div>
  </div>



  <script>
    window.AIC_I18N_FALLBACK = {
      'aic.newRoomTitle': '새 회의방 만들기',
      'aic.newRoomDesc': '번역 채팅 회의방을 생성합니다.',
      'aic.roomName': '회의방 이름',
      'aic.members': '참여자',
      'aic.cancel': '취소',
      'aic.create': '생성',
      'aic.myTranslationSettings': '내 번역 기본 설정',
      'aic.myTranslationSettingsDesc': 'AIC 회의방에서 기본 적용되는 개인 번역 설정입니다.',
      'aic.defaultInputLang': '기본 입력 언어',
      'aic.translationDirection': '번역 방향',
      'aic.translationTone': '번역 톤',
      'aic.displayMode': '번역 표시 방식',
      'aic.autoTranslate': '자동번역 사용',
      'aic.autoTranslateDesc': '메시지 전송 시 자동으로 번역문을 생성합니다.',
      'aic.save': '저장',
      'aic.close': '닫기',
      'aic.participants': '참여자',
      'aic.participantsDesc': '현재 회의방의 참여자를 확인하고 추가합니다.',
      'aic.participantName': '이름',
      'aic.participantEmail': '이메일/메모',
      'aic.add': '추가'
    };
    document.addEventListener('DOMContentLoaded', function(){
      var dict = window.AIC_I18N_FALLBACK || {};
      document.querySelectorAll('[data-i18n]').forEach(function(el){
        var key = el.getAttribute('data-i18n');
        if (dict[key] && (!el.textContent || el.textContent.trim() === key)) el.textContent = dict[key];
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el){
        var key = el.getAttribute('data-i18n-placeholder');
        if (dict[key] && (!el.getAttribute('placeholder') || el.getAttribute('placeholder') === key)) el.setAttribute('placeholder', dict[key]);
      });
    });
  </script>

  <script src="../assets/i18n/i18n-core.js"></script>
  <script src="./js/aic-config.js"></script>
  <script src="./js/aic-auth.js"></script>
  <script src="./js/aic-portal-bridge.js"></script>
  <script src="./js/aic-main.js"></script>
  <script>
    if (window.I18N && typeof window.I18N.init === 'function') {
      window.I18N.init();
    }
  </script>
</body>
</html>
