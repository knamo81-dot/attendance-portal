<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Main</title>
<link rel="stylesheet" href="../assets/css/common-ui.css">
<style>
:root{
  --bg:#f1f5f9;
  --card:#ffffff;
  --line:#d9e2ec;
  --text:#1f2937;
  --muted:#64748b;
  --shadow:var(--shadow-card, 0 5px 14px rgba(15,23,42,.045));
  --radius:var(--card-radius, 14px);
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  width:100%;
  min-width:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

body{
  padding:0;
  max-width:none;
}

.app{
  width:100%;
  max-width:none;
  margin:0;
  padding:0;
}

.shell{
  width:100%;
  max-width:none;
  margin:0;
  display:grid;
  gap:var(--gap-md, 8px);
}

.card{
  width:100%;
  max-width:none;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:var(--gap-md, 8px);
}

.quick{
  padding:var(--card-padding, 12px);
  min-height:78px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  transition:transform .15s ease, box-shadow .15s ease;
}

.quick:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 18px rgba(15,23,42,.08);
}

.quick-title{
  font-size:var(--font-title, 13px);
  font-weight:800;
  letter-spacing:-.03em;
  margin-bottom:5px;
  color:#0f172a;
}

.quick-desc{
  font-size:var(--font-base, 11px);
  line-height:1.45;
  color:var(--muted);
}

@media (max-width:1100px){
  .grid{
    grid-template-columns:1fr;
  }
}

@media (max-width:760px){
  .quick{
    padding:14px;
  }
}
</style>
</head>
<body>
<div class="app">
  <main class="shell">
    <section class="grid">
      <article class="card el-card quick">
        <div class="quick-title el-title">워크스페이스</div>
        <div class="quick-desc el-text">메모와 일정·예약을 통합 관리합니다.</div>
      </article>

      <article class="card el-card quick">
        <div class="quick-title el-title">연구소 운영</div>
        <div class="quick-desc el-text">근태, 폐수, 시약 등 운영 시스템으로 이동합니다.</div>
      </article>

      <article class="card el-card quick">
        <div class="quick-title el-title">통합 포털</div>
        <div class="quick-desc el-text">연구소 운영 데이터를 한 곳에서 관리합니다.</div>
      </article>
    </section>
  </main>
</div>
</body>
</html>
