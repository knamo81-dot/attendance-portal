<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Main</title>
<style>
:root{
  --bg:#f1f5f9;
  --card:#ffffff;
  --line:#d9e2ec;
  --text:#1f2937;
  --muted:#64748b;
  --shadow:0 10px 28px rgba(15,23,42,.08);
  --radius:22px;
  --red1:#c8102e;
  --red2:#e11d2e;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  width:100%;
  min-width:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

body{
  padding:0;
  max-width:none;
}

.app{
  width:100%;
  max-width:none;
  margin:0;
  padding:0;
}

.shell{
  width:100%;
  max-width:none;
  margin:0;
  display:grid;
  gap:12px;
}

.card{
  width:100%;
  max-width:none;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
}

.hero{
  background:linear-gradient(135deg,var(--red1) 0%,var(--red2) 100%);
  color:#fff;
  padding:32px 28px;
  min-height:140px;
  display:flex;
  align-items:flex-start;
  box-shadow:0 8px 24px rgba(15,23,42,.15);
}

.hero-top{
  font-size:14px;
  color:rgba(255,255,255,.78);
  margin-bottom:6px;
  font-weight:600;
}

.hero-title{
  font-size:34px;
  line-height:1.2;
  font-weight:800;
  letter-spacing:-.04em;
  margin:0;
}

.hero-sub{
  margin-top:10px;
  font-size:14px;
  color:rgba(255,255,255,.88);
  line-height:1.5;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:12px;
}

.quick{
  padding:22px 24px;
  min-height:96px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.quick-title{
  font-size:18px;
  font-weight:800;
  letter-spacing:-.03em;
  margin-bottom:8px;
  color:#0f172a;
}

.quick-desc{
  font-size:13px;
  line-height:1.6;
  color:var(--muted);
}

@media (max-width:1100px){
  .grid{
    grid-template-columns:1fr;
  }
}

@media (max-width:760px){
  .hero{
    padding:26px 22px;
    min-height:128px;
  }

  .hero-title{
    font-size:30px;
  }

  .quick{
    padding:20px;
  }
}
</style>
</head>
<body>
<div class="app">
  <main class="shell">
    <section class="card hero">
      <div>
        <div class="hero-top">Integrated Operations Platform</div>
        <div class="hero-title">통합 운영 플랫폼</div>
        <div class="hero-sub">연구소 운영 포털 메인 화면입니다.</div>
      </div>
    </section>

    <section class="grid">
      <article class="card quick">
        <div class="quick-title">워크스페이스</div>
        <div class="quick-desc">메모와 일정·예약을 통합 관리합니다.</div>
      </article>

      <article class="card quick">
        <div class="quick-title">연구소 운영</div>
        <div class="quick-desc">근태, 폐수, 시약 등 운영 시스템으로 이동합니다.</div>
      </article>

      <article class="card quick">
        <div class="quick-title">통합 포털</div>
        <div class="quick-desc">연구소 운영 데이터를 한 곳에서 관리합니다.</div>
      </article>
    </section>
  </main>
</div>
</body>
</html>
