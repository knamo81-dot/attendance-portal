<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Main</title>
<link rel="stylesheet" href="../assets/css/common-ui.css">
<link rel="stylesheet" href="../common/mobile.css">
<link rel="stylesheet" href="../common/theme.css">
<style>
:root{
  --home-bg:#f1f5f9;
  --home-card:#ffffff;
  --home-line:rgba(226,232,240,0.9);
  --home-text:#0f172a;
  --home-muted:#64748b;
  --home-radius:var(--card-radius, 14px);
  --home-gap:var(--card-gap, 8px);
  --home-shadow:var(--shadow-card, 0 5px 14px rgba(15,23,42,.045));
  --home-page-pad:var(--page-padding, 14px);
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  min-width:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;
  background:transparent;
  color:var(--home-text);
  overflow:hidden;
}

/* AIC 기준: iframe 내부는 포탈이 준 영역을 그대로 사용 */
.app{
  width:100%;
  height:100%;
  min-height:0;
  max-width:none;
  margin:0;
  padding:10px;
  overflow:hidden;
  background:transparent;
}

/* AIC 흰색박스 규격 */
.home-frame{
  width:100%;
  height:100%;
  min-height:0;
  max-width:none;
  margin:0;
  background:var(--home-card);
  border:1px solid var(--home-line);
  border-radius:var(--home-radius);
  box-shadow:var(--home-shadow);
  overflow:hidden;
  display:grid;
  grid-template-rows:minmax(0,1fr);
}

/* 홈 내부 콘텐츠 영역 */
.home-content{
  min-width:0;
  min-height:0;
  width:100%;
  height:100%;
  overflow:auto;
  padding:16px;
  background:#ffffff;
}

/* 현재는 탭/설정 제거 후 빈 작업영역만 유지 */
.empty-home{
  width:100%;
  height:100%;
  min-height:360px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#94a3b8;
  font-size:12px;
  font-weight:800;
  line-height:1.6;
}

@media (max-width:760px){
  .app{padding:10px}
  .home-content{padding:12px}
}
</style>
</head>
<body>
<div class="app">
  <main class="home-frame">
    <section class="home-content">
      <div class="empty-home" data-i18n="portal.home.emptyText">홈 화면 준비 중입니다.</div>
    </section>
  </main>
</div>

<script src="../assets/i18n/i18n-core.js"></script>
<script src="../common/common.js"></script>
<script>
(function(){
  function applyLanguage(lang){
    const nextLang = String(lang || 'ko').trim() || 'ko';

    try {
      localStorage.setItem('portal_lang', nextLang);
      localStorage.setItem('portal.lang', nextLang);
      localStorage.setItem('i18n.lang', nextLang);
      localStorage.setItem('lang', nextLang);
    } catch (_) {}

    if (typeof window.setLanguage === 'function') {
      window.setLanguage(nextLang);
    } else if (window.i18n && typeof window.i18n.setLanguage === 'function') {
      window.i18n.setLanguage(nextLang);
    }
  }

  const savedLang =
    localStorage.getItem('portal_lang') ||
    localStorage.getItem('portal.lang') ||
    localStorage.getItem('i18n.lang') ||
    localStorage.getItem('lang') ||
    'ko';

  applyLanguage(savedLang);

  window.addEventListener('message', function(event){
    const payload = event && event.data ? event.data : {};
    if (payload.type === 'portal-language-changed' || payload.type === 'LANGUAGE_CHANGED') {
      applyLanguage(payload.language || payload.lang || 'ko');
    }
  });

  window.addEventListener('portal-language-changed', function(event){
    applyLanguage(event?.detail?.language || event?.detail?.lang || 'ko');
  });
})();
</script>
</body>
</html>
